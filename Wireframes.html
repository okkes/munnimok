// Phone wrapper — IOSDevice gives us status bar + home indicator + chrome.
// We hide IOSDevice's status bar via a wrapper because our screens render
// their own status bar inside (low-fi look).
function Phone({ children, w = 360, h = 720 }) {
  return (
    <div style={{
      width: w, height: h, borderRadius: 40, overflow: 'hidden',
      position: 'relative', background: '#fff',
      boxShadow: '0 30px 60px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12), inset 0 0 0 6px #1a1a1a',
      fontFamily: '-apple-system, system-ui, sans-serif',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 9, left: '50%', transform: 'translateX(-50%)',
        width: 100, height: 28, borderRadius: 18, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', inset: 6, borderRadius: 34, overflow: 'hidden', background: '#fff', display: 'flex', flexDirection: 'column' }}>
        {children}
      </div>
      {/* home indicator */}
      <div style={{
        position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
        width: 110, height: 4, borderRadius: 100, background: 'rgba(0,0,0,0.25)', zIndex: 60,
      }}/>
    </div>
  );
}

// Annotation overlay floats over an artboard. Positions are world-space.
function AnnotLayer({ children }) {
  return <div className="annot-layer">{children}</div>;
}

// Convenience: returns a DCArtboard directly (NOT a wrapper component) so
// DCSection's direct-child filter sees it.
function frame({ id, label, children, annotations, w = 360, h = 720, padR = 200 }) {
  return (
    <DCArtboard key={id} id={id} label={label} width={w + padR} height={h}>
      <div style={{ position: 'relative', width: '100%', height: '100%' }}>
        <Phone w={w} h={h}>{children}</Phone>
        {annotations && (
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {annotations}
          </div>
        )}
      </div>
    </DCArtboard>
  );
}

// ─── App ─────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "homeVariant": "A",
  "expensesVariant": "A",
  "catReviewVariant": "Swipe",
  "showFeatureCallouts": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  return (
    <>
      <DesignCanvas title="munni — finance app wireframes">

        <DCSection id="auth" title="Auth & onboarding" subtitle="Splash → Login → Sign-up gate → Demo / Prod variants">

          {frame({ id: 'login', label: 'Login', annotations: A.login, children: <ScreenLogin/> })}
          {frame({ id: 'signup', label: 'Sign-up · pick mode', annotations: A.signup, children: <ScreenSignupGate/> })}
          {frame({ id: 'signup-demo', label: 'Sign-up · demo (dev)', annotations: A.signupDemo, children: <ScreenSignupDemo/> })}

        <DCSection id="home" title="Home" subtitle={`5 stats incl. Investment · Budgets is now a compact widget (not a tab). 2 layouts — variant ${tweaks.homeVariant}`}>

          {frame({ id: 'home-B', label: 'B · hero + stats', annotations: A.homeB, children: <ScreenHome variant="B"/> })}
          {frame({ id: 'home-budget-widget', label: 'Budgets widget (in home)', annotations: A.budgetsHomeWidget, children: <ScreenHome variant="A"/> })}

        </DCSection>

        <DCSection id="tx" title="Transactions" subtitle="List → detail → reimbursement linking">
          {frame({ id: 'tx-list', label: 'Transactions tab', annotations: A.tx, children: <ScreenTransactions/> })}
          {frame({ id: 'tx-detail', label: 'Transaction detail', annotations: A.txDetail, children: <ScreenTransactionDetail/> })}
          {frame({ id: 'tx-reimburse', label: 'Link reimbursement', annotations: A.reimburse, children: <ScreenReimbursementPicker/> })}
        </DCSection>

        <DCSection id="expenses" title="Expenses" subtitle={`2 layout variations — toggle in Tweaks. Active: variant ${tweaks.expensesVariant}`}>

          {frame({ id: 'exp-B', label: 'B · weighted bars', annotations: A.expensesB, children: <ScreenExpenses variant="B"/> })}
          {frame({ id: 'exp-cat-tx', label: 'Categorized transactions', annotations: A.catTx, children: <ScreenCategorizedTx/> })}
        </DCSection>

        <DCSection id="catreview" title="Category review (AI)" subtitle={`2 interaction models — toggle in Tweaks. Active: ${tweaks.catReviewVariant}. Skip = review later, no separate "later" button.`}>

        <DCSection id="allocate" title="Allocate (replaces Left to Spend)" subtitle="Period scrubber w/ arrows. Subscriptions FIRST (actionable), then fixed costs. Year overview added.">

          {frame({ id: 'event-add-tx', label: 'Add transactions to event', annotations: A.eventAddTx, children: <ScreenEventAddTx/> })}

        <DCSection id="goals" title="Goals" subtitle="Long-term savings buckets. Linked to bank saving balance — over-allocation warns user.">

        <DCSection id="integrations" title="Merchant integrations" subtitle="Connect Albert Heijn / Amazon / etc. for auto-attached itemised receipts.">

        </DCSection>

        <DCSection id="profile" title="Profile & Settings" subtitle="Account + drawer entries">
          {frame({ id: 'profile', label: 'Profile', annotations: A.profile, children: <ScreenProfile/> })}
          {frame({ id: 'settings', label: 'Settings', annotations: A.settings, children: <ScreenSettings/> })}
        </DCSection>

      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Home layout">
          <TweakRadio label="Home variant" value={tweaks.homeVariant} onChange={v => setTweak('homeVariant', v)} options={['A', 'B']}/>
          <div style={{ fontSize: 11, color: '#777', lineHeight: 1.4 }}>
            A = period grid 2×2, then review<br/>B = review first, period as hero
          </div>
        </TweakSection>

          <TweakRadio label="Expenses variant" value={tweaks.expensesVariant} onChange={v => setTweak('expensesVariant', v)} options={['A', 'B']}/>
          <div style={{ fontSize: 11, color: '#777', lineHeight: 1.4 }}>
            A = list with sub-cats<br/>B = weighted bar chart
          </div>
        </TweakSection>
        <TweakSection title="Category review">
          <TweakRadio label="Interaction" value={tweaks.catReviewVariant} onChange={v => setTweak('catReviewVariant', v)} options={['Swipe', 'List']}/>
          <div style={{ fontSize: 11, color: '#777', lineHeight: 1.4 }}>
            Swipe = full-screen, one tx<br/>List = stacked, inline ✓ ✗
          </div>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
