name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * *'  # daily 6 AM UTC — full test suite + gallery refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Install only the Chromium browser (faster than full install)
      - run: npx playwright install --with-deps chromium

      # Build the app
      - run: npm run build

      # Restore screenshots from cache so partial runs keep the full gallery intact
      - name: Restore screenshots cache
        uses: actions/cache@v4
        with:
          path: tests/screenshots
          key: screenshots-${{ github.run_id }}
          restore-keys: screenshots-
          save-always: true

      # On push: detect which spec files changed; run only those.
      # On schedule / manual dispatch: run all tests.
      # Also force full run if screenshots cache is empty (bootstrap / cache evicted).
      - name: Detect changed test specs
        id: tests
        run: |
          HAS_SHOTS=$(ls tests/screenshots/*.png 2>/dev/null | wc -l)
          if [ "$HAS_SHOTS" = "0" ]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "specs=" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "specs=" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "run_all=true" >> $GITHUB_OUTPUT
            echo "specs=" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'tests/specs/*.spec.js' | tr '\n' ' ')
            echo "run_all=false" >> $GITHUB_OUTPUT
            echo "specs=${CHANGED}" >> $GITHUB_OUTPUT
          fi

      # Full run: schedule / manual / first push to branch
      - name: Run all Playwright tests
        if: steps.tests.outputs.run_all == 'true'
        run: npx playwright test

      # Partial run: only spec files changed in this push
      - name: Run changed Playwright tests
        if: steps.tests.outputs.run_all != 'true' && steps.tests.outputs.specs != ''
        run: npx playwright test ${{ steps.tests.outputs.specs }}

      # Generate gallery HTML using --deploy flag (paths relative to gallery/ folder)
      - name: Generate gallery HTML
        run: |
          if ls tests/screenshots/*.png 1>/dev/null 2>&1; then
            node tests/generate-gallery.mjs --deploy
          fi

      # Copy gallery assets into dist/gallery/ so Pages serves them at /gallery/
      - name: Copy gallery to dist
        run: |
          mkdir -p dist/gallery/screenshots dist/gallery/videos
          if [ -f tests/gallery/index.html ]; then
            cp tests/gallery/index.html dist/gallery/
          fi
          if ls tests/screenshots/*.png 1>/dev/null 2>&1; then
            cp tests/screenshots/*.png dist/gallery/screenshots/
          fi
          if ls tests/videos/*.webm 1>/dev/null 2>&1; then
            cp tests/videos/*.webm dist/gallery/videos/
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # deploy-pages@v4 has a Node 24 OIDC auth bug — keep this job on Node 20 until fixed
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v4
      - id: deployment
        uses: actions/deploy-pages@v4
