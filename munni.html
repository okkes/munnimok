</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
// ── ios-frame.jsx ──────────────────────────────────────────────

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}
  </script>

  <script type="text/babel">
// ── theme.jsx ──────────────────────────────────────────────────

const M = {
  paper:   '#F7F4EE',
  paper2:  '#EFEAE0',
  card:    '#FFFFFF',
  ink:     '#1B1A17',
  ink2:    '#3D3A33',
  ink3:    '#6B6558',
  ink4:    '#9A9384',
  line:    '#E2DCCE',
  line2:   '#EFEAE0',
  sage:    '#4A6A4F',
  sageDk:  '#2F4A33',
  sageSoft:'#DDE6DA',
  clay:    '#B5503A',
  claySoft:'#F2DDD3',
  ochre:   '#A8782B',
  ochreSoft:'#F0E2C2',
  slate:   '#3F4E63',
  slateSoft:'#DDE2EA',
  violet:   '#5E4A78',
  violetSoft:'#E3DCED',

  fontUI:    "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif",
  fontDisp:  "'Source Serif 4', 'Source Serif Pro', Georgia, serif",
  fontMono:  "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace",
};

if (typeof document !== 'undefined' && !document.getElementById('m-styles')) {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap';
  document.head.appendChild(link);

  const s = document.createElement('style');
  s.id = 'm-styles';
  s.textContent = `
    .m, .m * { box-sizing: border-box; }
    .m-app { font-family: ${M.fontUI}; color: ${M.ink}; background: ${M.paper}; -webkit-font-smoothing: antialiased; }
    .m-num { font-family: ${M.fontDisp}; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .m-mono { font-family: ${M.fontMono}; }
    .m-row { display: flex; align-items: center; }
    .m-col { display: flex; flex-direction: column; }
    .m-card { background: ${M.card}; border-radius: 16px; }
    .m-card-bordered { background: ${M.card}; border: 1px solid ${M.line}; border-radius: 16px; }
    .m-divider { height: 1px; background: ${M.line2}; }
    .m-cap { font-size: 11px; color: ${M.ink3}; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
    .m-label { font-size: 12px; color: ${M.ink3}; }
    .m-chip { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; border:1px solid ${M.line}; background:${M.card}; color:${M.ink2}; }
    .m-pill { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:10px; font-weight:600; letter-spacing:0.02em; }
    .m-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:48px; padding:0 22px; border-radius:14px; font-size:15px; font-weight:600; border:none; background:${M.ink}; color:${M.paper}; cursor:pointer; transition: transform 0.1s, opacity 0.15s; font-family: ${M.fontUI}; }
    .m-btn:active { transform: scale(0.98); opacity: 0.9; }
    .m-btn.outline { background:transparent; color:${M.ink}; border:1px solid ${M.line}; }
    .m-btn.ghost { background:transparent; color:${M.ink}; }
    .m-btn.sage { background:${M.sage}; color:#fff; }
    .m-btn.sm { height: 36px; padding: 0 14px; font-size: 13px; border-radius: 10px; }
    .m-input { height:48px; border:1px solid ${M.line}; border-radius:12px; padding:0 16px; font-size:15px; background:${M.card}; color:${M.ink}; display:flex; align-items:center; gap:8px; font-family: ${M.fontUI}; }
    .m-input.empty { color:${M.ink4}; }
    .m-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: ${M.ink3}; }
    .m-h1 { font-family: ${M.fontDisp}; font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
    .m-h2 { font-family: ${M.fontDisp}; font-size: 24px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }
    .m-h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .m-body { font-size: 14px; color: ${M.ink2}; line-height: 1.45; }
    .m-tap { cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .m-tap:active { opacity: 0.7; transform: scale(0.98); }
    .m-screen { width:100%; height:100%; background:${M.paper}; color:${M.ink}; font-family:${M.fontUI}; display:flex; flex-direction:column; overflow:hidden; }
    .m-body-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 20px 24px; }
    .m-body-scroll::-webkit-scrollbar { display: none; }
    .m-appbar { display:flex; align-items:center; justify-content:space-between; padding: 8px 16px 12px; gap: 8px; flex-shrink: 0; }
    .m-iconbtn { width:36px; height:36px; border-radius:999px; background:transparent; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:${M.ink}; }
    .m-iconbtn.filled { background:${M.card}; border:1px solid ${M.line}; }
    @keyframes mFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .m-fade { animation: mFadeIn 0.28s ease-out both; }
    .m-logo { font-family: ${M.fontDisp}; font-weight: 600; letter-spacing: -0.04em; }
    .m-logo .dot { color: ${M.sage}; }
  `;
  document.head.appendChild(s);
}

function I({ name, size = 20, color = 'currentColor', stroke = 1.6 }) {
  const p = { stroke: color, strokeWidth: stroke, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const f = { fill: color, stroke: 'none' };
  const w = (kids) => <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block', flexShrink: 0 }}>{kids}</svg>;
  switch (name) {
    case 'home': return w(<path d="M3.5 11.5L12 4l8.5 7.5V20a1 1 0 01-1 1h-4.5v-6h-6v6H4.5a1 1 0 01-1-1z" {...p}/>);
    case 'list': return w(<><path d="M4 7h16M4 12h16M4 17h12" {...p}/></>);
    case 'star': return w(<path d="M12 4l2.4 5.4L20 10l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-.6z" {...p}/>);
    case 'user': return w(<><circle cx="12" cy="9" r="3.5" {...p}/><path d="M5 20c1.2-3.4 4-5 7-5s5.8 1.6 7 5" {...p}/></>);
    case 'plus': return w(<path d="M12 5v14M5 12h14" {...p}/>);
    case 'minus': return w(<path d="M5 12h14" {...p}/>);
    case 'check': return w(<path d="M5 12.5l4 4 10-10" {...p}/>);
    case 'x': return w(<path d="M6 6l12 12M18 6L6 18" {...p}/>);
    case 'arrowR': return w(<path d="M9 5l7 7-7 7" {...p}/>);

  <script type="text/babel">
// ── charts.jsx ─────────────────────────────────────────────────

function Sparkline({ data, width = 60, height = 20, color = M.ink, fill, strokeWidth = 1.5 }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const pts = data.map((v, i) => [i * stepX, height - ((v - min) / range) * height]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = fill ? `${d} L${width},${height} L0,${height} Z` : null;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      {fill && <path d={fillD} fill={fill} stroke="none"/>}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function BarChart({ data, labels, width = 280, height = 96, highlightLast = true, color = M.ink, accent = M.sage, showValues = false, selected = -1, onSelect }) {
  const max = Math.max(...data, 1);
  const padding = 6;
  const valueH = showValues ? 14 : 0;
  const labelH = labels ? 14 : 0;
  const barAreaH = height - valueH - labelH;
  const barW = (width - padding * (data.length - 1)) / data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      {data.map((v, i) => {
        const h = Math.max(2, (v / max) * (barAreaH - 4));
        const x = i * (barW + padding);
        const y = valueH + barAreaH - h;
        const isLast = i === data.length - 1;
        const isSel = selected === i;
        const barColor = (selected >= 0 ? isSel : (highlightLast && isLast)) ? accent : color;
        const opacity = selected >= 0 ? (isSel ? 1 : 0.22) : (highlightLast && !isLast ? 0.22 : 0.92);
        return (
          <g key={i} style={{ cursor: onSelect ? 'pointer' : 'default' }} onClick={() => onSelect && onSelect(i)}>
            <rect x={x - 3} y={valueH} width={barW + 6} height={barAreaH} rx={0} fill="transparent"/>
            <rect x={x} y={y} width={barW} height={h} rx={3} fill={barColor} opacity={opacity}/>
            {showValues && v > 0 && (
              <text x={x + barW / 2} y={valueH - 2} fontSize="8" fill={isSel || (selected < 0 && isLast) ? accent : color} textAnchor="middle" fontFamily="-apple-system,system-ui" fontWeight="600" opacity={opacity < 0.5 ? 0.5 : 1}>
                {v >= 1000 ? `€${(v/1000).toFixed(1)}k` : `€${Math.round(v)}`}
              </text>
            )}
            {labels && <text x={x + barW / 2} y={height - 2} fontSize="8" fill={M.ink4} textAnchor="middle" fontFamily="-apple-system,system-ui" fontWeight="500">{labels[i]}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function BarChartScrollable({ data, labels, height = 100, accent = M.sage, color = M.ink2, onSelect }) {
  const [sel, setSel] = React.useState(data.length - 1);
  const handleSelect = (i) => { setSel(i); onSelect && onSelect(i); };
  const barW = 28, gap = 8, totalW = Math.max(300, data.length * (barW + gap));
  const containerRef = React.useRef(null);
  React.useEffect(() => {
    if (containerRef.current) containerRef.current.scrollLeft = containerRef.current.scrollWidth;
  }, []);
  return (
    <div ref={containerRef} style={{ overflowX:'auto', WebkitOverflowScrolling:'touch', marginLeft:-4, paddingLeft:4 }}>
      <div style={{ width: totalW, minWidth: '100%' }}>
        <BarChart data={data} labels={labels} width={totalW} height={height} highlightLast={false}
          accent={accent} color={color} showValues selected={sel} onSelect={handleSelect}/>
      </div>
    </div>
  );
}

function Donut({ data, size = 130, thickness = 18, center }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={M.line2} strokeWidth={thickness}/>
        {data.map((d, i) => {
          const dash = (d.value / total) * (2 * Math.PI * r);
          const offset = (acc / total) * (2 * Math.PI * r);
          acc += d.value;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none"
              stroke={d.color} strokeWidth={thickness}
              strokeDasharray={`${dash} ${2 * Math.PI * r}`}
              strokeDashoffset={-offset}
              strokeLinecap="butt"/>
          );
        })}
      </svg>
      {center && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
          {center}
        </div>
      )}
    </div>
  );
}

function StackedBar({ segments, height = 8, radius = 999 }) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  return (
    <div style={{
      display: 'flex', height, borderRadius: radius,
      overflow: 'hidden', background: M.line2,
    }}>
      {segments.map((s, i) => (
        <div key={i} style={{
          width: `${(s.value / total) * 100}%`,
          background: s.color,
          borderRight: i < segments.length - 1 ? `1.5px solid ${M.paper}` : 'none',
        }}/>
      ))}
    </div>
  );
}

function LineChart({ data, width = 320, height = 120, color = M.sage, fill = 'rgba(74,106,79,0.10)', dots = false }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const padding = 4;
  const stepX = (width - padding * 2) / (data.length - 1);
  const pts = data.map((v, i) => [padding + i * stepX, padding + (height - padding * 2) * (1 - (v - min) / range)]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = `${d} L${pts[pts.length - 1][0]},${height} L${pts[0][0]},${height} Z`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <path d={fillD} fill={fill} stroke="none"/>
      <path d={d} fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
      {dots && pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3 : 0} fill={color}/>
      ))}
    </svg>
  );
}

function TxRow({ tx, onClick, showCat = true, showDate = false, dense = false, highlight = '' }) {
  const cat = CATEGORIES[tx.cat] || {};
  const positive = tx.amount > 0;
  const isLinkedReimburse = tx.linkedTo; // this tx is a reimbursement (income linked to an expense)

    }}>

        width: 38, height: 38, borderRadius: 10, background: M.paper2,

        flexShrink: 0,
      }}>
        <I name={cat.icon || 'box'} size={18} color={M.ink2} stroke={1.6}/>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8 }}>
          <div style={{ fontSize: 14, fontWeight: 500, color: M.ink, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1, minWidth: 0 }}>
            {highlight ? <HighlightText text={tx.merchant} query={highlight}/> : tx.merchant}
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5, flexShrink: 0 }}>
            {hasReimbursement && <div style={{ width:16, height:16, borderRadius:999, background:M.sageSoft, display:'flex', alignItems:'center', justifyContent:'center' }}><I name="link" size={9} color={M.sage}/></div>}
            {isLinkedReimburse && <div style={{ width:16, height:16, borderRadius:999, background:M.sageSoft, display:'flex', alignItems:'center', justifyContent:'center' }}><I name="link" size={9} color={M.sage}/></div>}
            <div className="m-num" style={{ fontSize: 15, fontWeight: 600, color: positive ? M.sage : M.ink }}>
              {positive ? '+' : ''}{fmtEur(tx.amount)}
            </div>
          </div>
        </div>
        {showCat && (
          <div style={{ display: 'flex', gap: 5, alignItems: 'center', marginTop: 3 }}>
            <div style={{ fontSize: 12, color: M.ink3, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', minWidth: 0 }}>
              {showDate ? fmtDate(tx.date) : (highlight ? <HighlightText text={catPath(cat)} query={highlight}/> : catPath(cat))}
            </div>
            {tx.recurring && <div style={{ width:14, height:14, borderRadius:4, background:M.paper2, border:`1px solid ${M.line}`, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, title:'Recurring' }}><I name="receipt" size={7} color={M.ink3}/></div>}
            {tx.needsReview && <div style={{ width:14, height:14, borderRadius:4, background:M.ochreSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}><I name="alert" size={7} color={M.ochre}/></div>}
          </div>
        )}
      </div>
    </div>
  );
}

function budgetDaysLeft(b) {
  const TODAY = new Date('2026-02-18');
  const periodStart = new Date('2026-01-20');
  const elapsed = Math.floor((TODAY - periodStart) / 86400000) % b.periodDays;
  return b.periodDays - elapsed;
}

function BudgetMini({ b, onClick }) {
  const ratio = b.spent / b.total;
  const over = ratio > 1;
  const color = budgetColor(ratio);
  const left = b.total - b.spent;
  return (
    <div className="m-tap" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 32, height: 32, borderRadius: 9, background: budgetSoft(ratio), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <I name={b.icon} size={16} color={color}/>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{b.name}</div>
          <div className="m-num" style={{ fontSize: 12, fontWeight: 600, color: over ? M.clay : M.ink2 }}>
            {over ? `−${fmtEurInt(Math.abs(left))}` : `${fmtEurInt(left)} left`}
          </div>
        </div>
        <div style={{ height: 5, marginTop: 6, borderRadius: 999, background: M.line2, overflow: 'hidden', display: 'flex' }}>
          <div style={{ width: `${Math.min(100, ratio * 100)}%`, height: '100%', background: color }}/>
          {over && <div style={{ flex: 1, background: `repeating-linear-gradient(45deg, ${M.clay} 0 3px, ${M.claySoft} 3px 6px)` }}/>}
        </div>
        <div style={{ fontSize:10, color:M.ink4, marginTop:4 }}>{budgetDaysLeft(b)}d left</div>
      </div>
    </div>
  );
}

  <script type="text/babel">
// ── screens-tx.jsx ─────────────────────────────────────────────

function HighlightText({ text, query }) {
  if (!query) return <span>{text}</span>;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return <span>{text}</span>;
  return (
    <span>
      {text.slice(0, idx)}
      <mark style={{ background: M.ochreSoft, color: M.ochre, borderRadius: 3, padding: '0 2px' }}>{text.slice(idx, idx + query.length)}</mark>
      {text.slice(idx + query.length)}
    </span>
  );
}

function ScreenTransactions() {
  const nav = useNav();
  const [filter, setFilter] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [searchOpen, setSearchOpen] = React.useState(false);
  const searchRef = React.useRef(null);

  React.useEffect(() => { if (searchOpen && searchRef.current) searchRef.current.focus(); }, [searchOpen]);

  let filtered = TRANSACTIONS;
  if (filter === 'income') filtered = filtered.filter(t => t.amount > 0);
  if (filter === 'expense') filtered = filtered.filter(t => t.amount < 0);
  if (filter === 'review') filtered = filtered.filter(t => t.needsReview);
  if (filter === 'recurring') filtered = filtered.filter(t => t.recurring);
  if (query) filtered = filtered.filter(t =>
    t.merchant.toLowerCase().includes(query.toLowerCase()) ||
    t.desc.toLowerCase().includes(query.toLowerCase())
  );

  const groups = {};
  filtered.forEach(t => {
    const k = t.date;
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });
  const days = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  const filters = [
    { id: 'all', label: 'All' },
    { id: 'income', label: 'Income' },
    { id: 'expense', label: 'Expense' },
    { id: 'review', label: 'Review' },
    { id: 'recurring', label: 'Recurring' },
  ];

  return (
    <div className="m-screen">
      <StatusBar/>
      {searchOpen ? (
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 16px', flexShrink:0, borderBottom:`1px solid ${M.line2}` }}>
          <I name="search" size={16} color={M.ink3}/>
          <input
            ref={searchRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search transactions…"
            style={{ flex:1, border:'none', outline:'none', fontSize:15, fontFamily:M.fontUI, background:'transparent', color:M.ink }}
          />
          <button className="m-tap" onClick={() => { setSearchOpen(false); setQuery(''); }}
            style={{ background:'transparent', border:'none', fontSize:13, fontWeight:600, color:M.ink3, cursor:'pointer', fontFamily:M.fontUI }}>
            Cancel
          </button>
        </div>
      ) : (
        <AppBar title="Transactions" large
          leading={null}
          trailing={
            <button className="m-iconbtn m-tap" onClick={() => setSearchOpen(true)}>
              <I name="search" size={20}/>
            </button>
          }
        />
      )}

      {!searchOpen && (
        <div style={{ padding: '0 20px 12px', display: 'flex', gap: 6, overflowX: 'auto', flexShrink: 0 }}>
          {filters.map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className="m-chip m-tap"
              style={{
                background: filter === f.id ? M.ink : M.card,
                color: filter === f.id ? M.paper : M.ink2,
                borderColor: filter === f.id ? M.ink : M.line,
                fontWeight: filter === f.id ? 600 : 500,
                flexShrink: 0,
              }}>{f.label}</button>
          ))}
        </div>
      )}

      <div className="m-body-scroll">
        {days.map(d => (
          <div key={d} style={{ marginBottom: 18 }}>
            <div style={{ marginBottom: 8, padding: '0 4px' }}>
              <div className="m-cap">{dayLabel(d)}</div>
            </div>
            <div className="m-card" style={{ padding: '0 16px', border: `1px solid ${M.line}` }}>
              {groups[d].map((t, i, a) => (
                <React.Fragment key={t.id}>
                  <TxRow tx={t} onClick={() => nav.push('txDetail', { id: t.id })} highlight={query}/>
                  {i < a.length - 1 && <Divider inset={50}/>}
                </React.Fragment>
              ))}
            </div>
          </div>
        ))}
        {days.length === 0 && (
          <div style={{ textAlign: 'center', padding: 40, color: M.ink3 }}>
            <I name="search" size={32} color={M.ink4}/>
            <div style={{ marginTop: 8, fontSize: 14 }}>{query ? `No results for "${query}"` : 'No transactions'}</div>
          </div>
        )}
      </div>

      <TabBar active="tx" onChange={(t) => nav.switchTab(t)}/>
    </div>
  );
}

function ScreenTxDetail({ params }) {
  const nav = useNav();
  const { txs, updateTx } = useTxCtx();
  const { recurList, addRecur } = useRecurCtx();

  const [showLinkRecurring, setShowLinkRecurring] = React.useState(false);
  const [showCatPicker, setShowCatPicker] = React.useState(false);
  const [showReceiptEdit, setShowReceiptEdit] = React.useState(false);

  const tx = txs.find(t => t.id === params.id) || txs[0] || TRANSACTIONS[0];
  const positive = tx.amount > 0;

  const initCats = () => tx.cats ? tx.cats.slice() : [{ catId: tx.cat, amount: Math.abs(tx.amount) }];
  const [txCats, setTxCats] = React.useState(initCats);
  const [noteText, setNoteText] = React.useState(tx.note || '');
  const [hasReceiptState, setHasReceiptState] = React.useState(tx.hasReceipt || false);

  const NOTE_MAX = 200;

  const linkedTx = txs.find(t => t.linkedTo === tx.id);
  const originalTx = tx.linkedTo ? txs.find(t => t.id === tx.linkedTo) : null;
  const reimburseAmt = linkedTx ? linkedTx.amount : 0;
  const net = tx.amount + reimburseAmt;
  const netOriginalTx = originalTx ? originalTx.amount + tx.amount : 0;

  const account = ACCOUNTS.find(a => a.id === tx.account);

  const linkedRecurId = tx.recurId || null;
  const linkedRecurring = recurList.find(r => r.id === linkedRecurId || r.txIds?.includes(tx.id));

  const primaryCat = CATEGORIES[txCats[0]?.catId] || {};
  const allocTotal = txCats.reduce((s, c) => s + c.amount, 0);
  const remaining = Math.round((Math.abs(tx.amount) - allocTotal) * 100) / 100;

  const heroAmount = reimburseAmt !== 0 ? net : tx.amount;
  const showOriginal = reimburseAmt !== 0;

  const saveNote = (text) => { updateTx(tx.id, { note: text }); };

  const removeCategory = (i) => {
    setTxCats(s => {
      if (s.length === 1) {
        const fallback = positive ? 'incomeUncategorized' : 'expenseUncategorized';
        return [{ catId: fallback, amount: Math.abs(tx.amount) }];
      }
      return s.filter((_, j) => j !== i);
    });
  };

  return (
    <div className="m-screen" style={{ position: 'relative' }}>
      <StatusBar/>
      <AppBar title=""
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        trailing={null}
      />
      <div className="m-body-scroll">
        {/* Hero */}
        <div style={{ textAlign: 'center', padding: '8px 0 28px' }}>
          <div style={{
            width: 64, height: 64, borderRadius: 18, background: M.paper2,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            margin: '0 auto 14px',
          }}>
            <I name={primaryCat.icon || 'box'} size={28} color={M.ink2}/>
          </div>
          <div className="m-num" style={{ fontSize: 38, fontWeight: 600, color: heroAmount > 0 ? M.sage : (heroAmount === 0 ? M.ink3 : M.ink), letterSpacing: '-0.025em' }}>
            {heroAmount > 0 ? '+' : heroAmount < 0 ? '−' : ''}{fmtEur(Math.abs(heroAmount))}
          </div>
          <div className="m-h2" style={{ marginTop: 14 }}>{tx.merchant}</div>
          <div style={{ fontSize: 13, color: M.ink3, marginTop: 4 }}>{fmtDate(tx.date, 'long')} · {tx.time}</div>
        </div>

        {/* Categories — own card */}
        <div className="m-card" style={{ padding: '12px 16px', marginBottom: 14, border: `1px solid ${M.line}` }}>
          <div className="m-cap" style={{ marginBottom: 8 }}>Categories</div>
          {txCats.map((c, i) => {
            const cat = CATEGORIES[c.catId] || {};
            return (
              <React.Fragment key={c.catId + i}>
                <div style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0' }}>
                  <div style={{ width:28, height:28, borderRadius:8, background:M.paper2, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                    <I name={cat.icon||'box'} size={14} color={M.ink2}/>
                  </div>
                  <div style={{ flex:1, fontSize:13, fontWeight:500 }}>{catPath(cat)}</div>
                  <div className="m-num" style={{ fontSize:13, color:M.ink2 }}>{fmtEur(c.amount)}</div>
                  <button onClick={() => removeCategory(i)} style={{ background:'none', border:'none', color:M.clay, padding:'0 4px', fontSize:18, lineHeight:1, cursor:'pointer', fontFamily:M.fontUI }}>×</button>
                </div>
                {i < txCats.length - 1 && <Divider/>}
              </React.Fragment>
            );
          })}
          {remaining > 0.005 && (
            <div style={{ display:'flex', alignItems:'center', gap:8, padding:'7px 0', borderTop:`1px dashed ${M.line2}`, marginTop:4 }}>
              <div style={{ width:28, height:28 }}/>
              <span style={{ flex:1, fontSize:12, color:M.ink4 }}>Unallocated</span>
              <span className="m-num" style={{ fontSize:12, color:M.ink4 }}>{fmtEur(remaining)}</span>
            </div>
          )}
          {remaining > 0.005 && (
            <div className="m-tap" onClick={() => setShowCatPicker(true)} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', borderTop:`1px solid ${M.line2}`, marginTop:4 }}>
              <div style={{ width:28, height:28, borderRadius:8, background:M.sageSoft, display:'flex', alignItems:'center', justifyContent:'center' }}>
                <I name="plus" size={14} color={M.sage}/>
              </div>
              <span style={{ fontSize:13, color:M.sage, fontWeight:500 }}>Add category split</span>
            </div>
          )}
        </div>

        {/* General info card */}
        <div className="m-card" style={{ padding: '4px 16px', marginBottom: 14, border: `1px solid ${M.line}` }}>
          <DetailRow label="Account" value={account?.name || '—'}/>
          {showOriginal && (
            <>
              <Divider inset={0}/>
              <DetailRow label="Original" value={`${tx.amount > 0 ? '+' : '−'}${fmtEur(Math.abs(tx.amount))}`}/>
            </>
          )}
          <Divider inset={0}/>
          {!positive && (
            <>
              <div className="m-tap" onClick={() => setShowLinkRecurring(true)} style={{ display:'flex', alignItems:'center', gap:10, padding:'14px 0' }}>
                <div style={{ fontSize:12, color:M.ink3, width:96 }}>Recurring</div>
                <div style={{ flex:1, fontSize:13, color:linkedRecurring?M.ink:M.ink4, display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
                  {linkedRecurring ? (
                    <>
                      <I name={linkedRecurring.icon} size={14} color={M.ink3}/>
                      <span style={{ overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{linkedRecurring.name}</span>
                    </>
                  ) : 'Link to recurring…'}
                </div>
                {linkedRecurring ? (
                  <button className="m-tap" onClick={e => { e.stopPropagation(); updateTx(tx.id, { recurId: null }); }}
                    style={{ background:'none', border:'none', color:M.clay, fontSize:16, lineHeight:1, cursor:'pointer', fontFamily:M.fontUI, padding:'0 4px' }}>×</button>
                ) : (
                  <I name="caretR" size={14} color={M.ink4}/>
                )}
              </div>
              <Divider inset={0}/>
            </>
          )}
          <DetailRow label="Description" value={tx.desc} mono/>
          <Divider inset={0}/>
          {noteText !== undefined && (
            <div className="m-tap" onClick={() => {}} style={{ display:'flex', alignItems:'flex-start', gap:10, padding:'12px 0' }}>
              <div style={{ fontSize:12, color:M.ink3, width:96, paddingTop:1 }}>Note</div>
              <textarea
                value={noteText}
                onChange={e => setNoteText(e.target.value.slice(0, NOTE_MAX))}
                onBlur={() => saveNote(noteText)}
                rows={noteText ? Math.min(5, Math.ceil(noteText.length / 40) + 1) : 2}
                placeholder="Add a note…"

function ScreenExpenses() {
  const nav = useNav();
  const PERIOD_LABELS = ['Sep–Oct','Oct–Nov','Nov–Dec','Dec–Jan','Jan–Feb','Feb–Mar'];
  const [selBar, setSelBar] = React.useState(SPEND_HISTORY.total.length - 1);
  const periodLabel = PERIOD_LABELS[selBar] || PERIOD_LABELS[PERIOD_LABELS.length - 1];
  const isCurrentPeriod = selBar === SPEND_HISTORY.total.length - 1;

  const totals = {};
  TRANSACTIONS.filter(t => t.amount < 0).forEach(t => {
    const c = CATEGORIES[t.cat];
    const grp = c?.parent || c?.id;
    if (!totals[grp]) totals[grp] = { id: grp, name: CATEGORIES[grp]?.name || c?.group || c?.name, icon: CATEGORIES[grp]?.icon || c?.icon, total: 0, subs: {} };
    totals[grp].total += Math.abs(t.amount);
    if (c?.parent) {
      if (!totals[grp].subs[c.id]) totals[grp].subs[c.id] = { id: c.id, name: c.name, total: 0, count: 0 };
      totals[grp].subs[c.id].total += Math.abs(t.amount);
      totals[grp].subs[c.id].count += 1;
    }
  });

  const cats = Object.values(totals).sort((a, b) => b.total - a.total);
  const grandTotal = isCurrentPeriod
    ? cats.reduce((s, c) => s + c.total, 0)
    : SPEND_HISTORY.total[selBar] || cats.reduce((s, c) => s + c.total, 0);
  const [expanded, setExpanded] = React.useState({ consumptions: true, essentials: true });

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Expenses"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        trailing={<button className="m-iconbtn m-tap"><I name="filter" size={20}/></button>}
      />
      <div className="m-body-scroll">
        <div style={{ textAlign: 'center', padding: '8px 0 16px' }}>
          <div className="m-num" style={{ fontSize: 38, fontWeight: 600, letterSpacing: '-0.025em' }}>{fmtEur(grandTotal)}</div>
          <div style={{ fontSize: 12, color: M.ink3, marginTop: 4, fontWeight: 500 }}>
            {periodLabel}
          </div>
        </div>

        <div className="m-card" style={{ padding:'12px 16px 8px', marginBottom:14, border:`1px solid ${M.line}` }}>
          <div className="m-cap" style={{ marginBottom:8 }}>6-period history · tap to navigate</div>
          <BarChartScrollable
            data={SPEND_HISTORY.total}
            labels={PERIOD_LABELS}
            height={90}
            accent={M.clay}
            color={M.ink3}
            onSelect={setSelBar}
          />
        </div>

        <StackedBar height={10} segments={cats.map((c, i) => ({
          value: c.total, color: [M.sage, M.clay, M.ochre, M.violet, M.slate, M.ink3][i % 6],
        }))}/>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 14, marginBottom: 18 }}>
          {cats.map((c, i) => (
            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: M.ink2 }}>
              <div style={{ width: 7, height: 7, borderRadius: 2, background: [M.sage, M.clay, M.ochre, M.violet, M.slate, M.ink3][i % 6] }}/>
              {c.name}
            </div>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {cats.map(c => {
            const subs = Object.values(c.subs);
            const isOpen = expanded[c.id];
            const pct = (c.total / grandTotal) * 100;
            return (
              <div key={c.id} className="m-card" style={{ border: `1px solid ${M.line}`, overflow: 'hidden' }}>
                <div className="m-tap" onClick={() => subs.length > 0 && setExpanded({ ...expanded, [c.id]: !isOpen })}
                  style={{ padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: M.paper2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <I name={c.icon || 'box'} size={18} color={M.ink2}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{c.name}</div>
                      <div className="m-num" style={{ fontSize: 14, fontWeight: 600 }}>{fmtEur(c.total)}</div>
                    </div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                      <div style={{ flex: 1, height: 4, borderRadius: 999, background: M.line2, overflow: 'hidden' }}>
                        <div style={{ width: `${pct}%`, height: '100%', background: M.ink2 }}/>
                      </div>
                      <div style={{ fontSize: 11, color: M.ink3, fontWeight: 500, minWidth: 28, textAlign: 'right' }}>{pct.toFixed(0)}%</div>
                    </div>
                  </div>
                  {subs.length > 0 && <I name={isOpen ? 'arrowDn' : 'caretR'} size={14} color={M.ink4}/>}
                </div>
                {isOpen && subs.length > 0 && (
                  <div style={{ background: M.paper2 }}>
                    {/* All — shows every transaction under this parent */}
                    <Divider inset={0}/>
                    <div className="m-tap" onClick={() => nav.push('categoryDrill', { id: c.id })}
                      style={{ padding: '11px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div style={{ width: 30, height: 30, borderRadius: 8, background: '#fff', border: `1px solid ${M.line2}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                        <I name={c.icon || 'box'} size={14} color={M.ink3}/>
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600 }}>All {c.name}</div>
                        <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{subs.reduce((s, x) => s + x.count, 0)} transactions</div>
                      </div>
                      <div className="m-num" style={{ fontSize: 13, fontWeight: 600 }}>{fmtEur(c.total)}</div>
                      <I name="caretR" size={12} color={M.ink4}/>
                    </div>
                    {/* Individual subcategories */}
                    {subs.map((s) => {
                      const subCat = CATEGORIES[s.id] || {};
                      return (
                        <React.Fragment key={s.id}>
                          <Divider inset={58}/>
                          <div className="m-tap" onClick={() => nav.push('categoryDrill', { id: s.id })}
                            style={{ padding: '11px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                            <div style={{ width: 30, height: 30, borderRadius: 8, background: '#fff', border: `1px solid ${M.line2}`, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                              <I name={subCat.icon || 'box'} size={14} color={M.ink2}/>
                            </div>
                            <div style={{ flex: 1 }}>
                              <div style={{ fontSize: 13, fontWeight: 500 }}>{s.name}</div>
                              <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{s.count} transactions</div>
                            </div>
                            <div className="m-num" style={{ fontSize: 13, fontWeight: 600 }}>{fmtEur(s.total)}</div>
                            <I name="caretR" size={12} color={M.ink4}/>
                          </div>
                        </React.Fragment>
                      );
                    })}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ScreenCategoryDrill({ params }) {
  const nav = useNav();
  const cat = CATEGORIES[params?.id] || CATEGORIES.restaurants;
  const isParent = !!cat.isParent;

  const childIds = isParent
    ? Object.values(CATEGORIES).filter(c => c.parent === cat.id).map(c => c.id)
    : [cat.id];

  const txs = TRANSACTIONS.filter(t => t.amount < 0 && childIds.includes(t.cat));
  const total = txs.reduce((s, t) => s + Math.abs(t.amount), 0);

  const months = ['Sep–Oct','Oct–Nov','Nov–Dec','Dec–Jan','Jan–Feb','Feb–Mar'];
  const history = isParent
    ? months.map((_, i) => childIds.reduce((s, id) => s + (SPEND_HISTORY[id]?.[i] || 0), 0))
    : (SPEND_HISTORY[cat.id] || [50, 60, 55, 70, 65, total]);

  const title = isParent ? `All ${cat.name}` : cat.name;
  const sub   = isParent ? null : cat.group;

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title={title} sub={sub}
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        trailing={<button className="m-iconbtn m-tap"><I name="filter" size={20}/></button>}
      />
      <div className="m-body-scroll">
        <div className="m-card" style={{ padding: 18, marginBottom: 14, border: `1px solid ${M.line}` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div className="m-cap">Spent this period</div>
            <div style={{ fontSize: 11, color: M.clay, fontWeight: 600 }}>+12% vs avg</div>
          </div>
          <div className="m-num" style={{ fontSize: 30, fontWeight: 600, marginTop: 4 }}>{fmtEur(total)}</div>
          <div style={{ marginTop: 16 }}>
            <BarChart data={history} labels={months} height={84} accent={M.ink} color={M.ink}/>
          </div>
        </div>

        <div className="m-cap" style={{ marginBottom: 8, paddingLeft: 4 }}>Transactions · {txs.length}</div>
        <div className="m-card" style={{ padding: '0 16px', border: `1px solid ${M.line}` }}>
          {txs.map((t, i, a) => (
            <React.Fragment key={t.id}>
              <TxRow tx={t} showDate onClick={() => nav.push('txDetail', { id: t.id })}/>
              {i < a.length - 1 && <Divider inset={50}/>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

    closed:   { label: 'Closed',   bg: 'rgba(0,0,0,0.50)',     color: '#fff' },
    planning: { label: 'Planning', bg: 'rgba(122,92,32,0.85)', color: '#fff' },
    upcoming: { label: 'Upcoming', bg: 'rgba(63,78,99,0.85)',  color: '#fff' },

          <div style={{ color: 'rgba(255,255,255,0.82)', fontSize: 12, marginTop: 3, textShadow: '0 1px 4px rgba(0,0,0,0.5)' }}>

        <div style={{ position: 'absolute', top: 12, right: 12, padding: '4px 10px', borderRadius: 999, background: status.bg, color: status.color, fontSize: 10, fontWeight: 600, letterSpacing: '0.04em', textTransform: 'uppercase', backdropFilter: 'blur(4px)' }}>{status.label}</div>

        </div>

        <div className="m-cap" style={{ marginBottom:8, paddingLeft:4 }}>Period start day</div>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(7, 1fr)', gap:8, marginBottom:20 }}>
          {days.map(d => (
            <button key={d} className="m-tap" onClick={() => setSelectedDay(d)} style={{
              height:44, borderRadius:12, border:`1.5px solid ${selectedDay === d ? M.sage : M.line}`,
              background: selectedDay === d ? M.sage : M.card,
              color: selectedDay === d ? '#fff' : M.ink,
              fontSize:14, fontWeight: selectedDay === d ? 700 : 400,
              cursor:'pointer', fontFamily:M.fontUI,
              display:'flex', alignItems:'center', justifyContent:'center',
            }}>{d}</button>
          ))}
        </div>

        <div className="m-card" style={{ padding:14, marginBottom:16, border:`1px solid ${M.line}` }}>
          <div style={{ fontSize:13, fontWeight:600, marginBottom:4 }}>Current period</div>
          <div style={{ fontSize:13, color:M.ink3 }}>
            {ordinalStr(selectedDay)} of each month — period runs from the <strong>{ordinalStr(selectedDay)}</strong> to the <strong>{ordinalStr(selectedDay === 1 ? 28 : selectedDay - 1)}</strong> of the following month.
          </div>
        </div>

        <div style={{ padding:'10px 14px', borderRadius:10, background:M.ochreSoft, marginBottom:20, fontSize:12, color:M.ochre, lineHeight:1.5 }}>

function ScreenNotifications() {
  const nav = useNav();
  const { addTxs } = useTxCtx();
  const [syncing, setSyncing] = React.useState(false);
  const [lastSynced, setLastSynced] = React.useState(null);
  const [newCount, setNewCount] = React.useState(0);

  const MERCHANTS_POOL = [
    { merchant:'Albert Heijn', desc:'AH 5821', cat:'groceries', min:8, max:85 },
    { merchant:'Koffie ☕', desc:'TOKI ESPRESSO', cat:'coffee', min:3, max:6 },
    { merchant:'NS · Sprinter', desc:'NS REIZIGERS', cat:'transportPublic', min:4, max:28 },
    { merchant:'Etos', desc:'ETOS 0341', cat:'toiletry', min:5, max:35 },
    { merchant:'Vapiano', desc:'VAPIANO 1234', cat:'restaurants', min:12, max:38 },
    { merchant:'Coolblue', desc:'COOLBLUE ORDER', cat:'electronics', min:29, max:199, confidence:55, needsReview:true },
    { merchant:'Apotheek Centraal', desc:'APOTHEEK 7842', cat:'prescription', min:8, max:40, confidence:58, needsReview:true },
  ];

  const handleSync = () => {
    setSyncing(true);
    setTimeout(() => {
      const count = Math.floor(Math.random() * 5) + 1;
      const now = new Date();
      const newTxs = Array.from({ length: count }, (_, i) => {
        const pool = MERCHANTS_POOL[Math.floor(Math.random() * MERCHANTS_POOL.length)];
        const amt = -(Math.round((pool.min + Math.random() * (pool.max - pool.min)) * 100) / 100);
        const id = `tsync_${Date.now()}_${i}`;
        return { id, date: '2026-02-18', time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`, merchant: pool.merchant, desc: pool.desc, cat: pool.cat, amount: amt, account: 'main', ...(pool.confidence ? { confidence: pool.confidence } : {}), ...(pool.needsReview ? { needsReview: true } : {}) };
      });
      addTxs(newTxs);
      setNewCount(count);
      setLastSynced(now.toLocaleTimeString('en-NL', { hour:'2-digit', minute:'2-digit' }));
      setSyncing(false);
    }, 1200);
  };

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Notifications"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
      />
      <div className="m-body-scroll">
        <div className="m-card" style={{ padding:16, marginBottom:16, border:`1px solid ${M.line}` }}>
          <div style={{ display:'flex', alignItems:'center', gap:14, marginBottom:14 }}>
            <div style={{ width:44, height:44, borderRadius:13, background:M.sageSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <I name="sync" size={20} color={M.sage}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:15, fontWeight:600 }}>Bank sync</div>
              <div style={{ fontSize:12, color:M.ink3, marginTop:2 }}>{lastSynced ? `Last synced at ${lastSynced} · ${newCount} new` : 'Pull latest transactions from your bank'}</div>
            </div>
          </div>
          <button className="m-btn sage m-tap" style={{ width:'100%' }} onClick={handleSync} disabled={syncing}>
            {syncing ? (
              <><I name="sync" size={16} color="#fff"/> Syncing…</>
            ) : (
              <><I name="sync" size={16} color="#fff"/> Sync now</>
            )}
          </button>
          {newCount > 0 && (
            <div style={{ marginTop:10, padding:'8px 12px', borderRadius:10, background:M.sageSoft, fontSize:12, color:M.sage, fontWeight:500 }}>
              {newCount} new transaction{newCount > 1 ? 's' : ''} added — {TRANSACTIONS.filter(t => t.needsReview).length > 0 ? 'some need review' : 'all categorised'}
            </div>
          )}
        </div>

        <div className="m-cap" style={{ marginBottom:8, paddingLeft:4 }}>Recent notifications</div>
        <div className="m-card" style={{ padding:'4px 16px', marginBottom:16, border:`1px solid ${M.line}` }}>
          {[
            { icon:'check', color:M.sage, title:'12 transactions synced', sub:'2 hours ago · all categorised' },
            { icon:'alert', color:M.ochre, title:'3 transactions need review', sub:'2 hours ago · tap to review' },
            { icon:'wallet', color:M.violet, title:'Salary received', sub:'Yesterday · +€2,480.00' },
          ].map((n, i, a) => (
            <React.Fragment key={i}>
              <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 0' }}>
                <div style={{ width:32, height:32, borderRadius:9, background:n.color+'22', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <I name={n.icon} size={15} color={n.color}/>
                </div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:13, fontWeight:500 }}>{n.title}</div>
                  <div style={{ fontSize:11, color:M.ink3, marginTop:1 }}>{n.sub}</div>
                </div>
              </div>
              {i < a.length - 1 && <Divider inset={44}/>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScreenCustomizeHome() {
  const nav = useNav();
  const LOCKED = new Set(['period', 'review']);
  const [secs, setSecs] = React.useState([
    { id:'period',     label:'This period',    sub:'Period stats — always visible', visible:true },
    { id:'review',     label:'Category review',sub:'Uncategorized transactions — always visible', visible:true },
    { id:'budgets',    label:'Budgets',         sub:'Budget overview', visible:true },
    { id:'goals',      label:'Goals',           sub:'Savings goals progress', visible:true },
    { id:'investment', label:'Portfolio',        sub:'Investment overview', visible:true },
  ]);

  const move = (i, dir) => setSecs(s => {
    const ns = [...s], t = i + dir;
    if (t < 0 || t >= ns.length) return ns;
    [ns[i], ns[t]] = [ns[t], ns[i]];
    return ns;
  });
  const toggle = (id) => setSecs(s => s.map(x => x.id === id ? { ...x, visible: !x.visible } : x));

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Customize home"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        trailing={<button className="m-tap" style={{ background:'transparent', border:'none', fontSize:14, fontWeight:600, color:M.sage, fontFamily:M.fontUI }} onClick={() => nav.pop()}>Save</button>}
      />
      <div className="m-body-scroll">
        <div style={{ fontSize:13, color:M.ink3, marginBottom:16, paddingLeft:4, lineHeight:1.5 }}>
          Choose which cards appear on your home screen and in what order. Locked cards are always shown.
        </div>
        <div className="m-card" style={{ border:`1px solid ${M.line}` }}>
          {secs.map((s, i) => {
            const locked = LOCKED.has(s.id);
            return (
              <React.Fragment key={s.id}>
                <div style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px' }}>
                  {locked ? (
                    <div style={{ width:28, height:28, borderRadius:8, background:M.paper2, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                      <I name="lock" size={13} color={M.ink4}/>
                    </div>
                  ) : (
                    <button className="m-tap" onClick={() => toggle(s.id)} style={{
                      width:28, height:28, borderRadius:8, flexShrink:0, cursor:'pointer',
                      border:`1.5px solid ${s.visible?M.sage:M.line}`,
                      background:s.visible?M.sage:'transparent',
                      display:'flex', alignItems:'center', justifyContent:'center',
                    }}>
                      {s.visible && <I name="check" size={13} color="#fff" stroke={2.5}/>}
                    </button>
                  )}
                  <div style={{ flex:1, opacity:(!s.visible&&!locked)?0.5:1 }}>
                    <div style={{ fontSize:14, fontWeight:500 }}>{s.label}</div>
                    <div style={{ fontSize:11, color:M.ink3, marginTop:1 }}>{s.sub}</div>
                  </div>
                  {!locked && (
                    <div style={{ display:'flex', flexDirection:'column', gap:3 }}>
                      <button className="m-tap" onClick={() => move(i, -1)} style={{ width:26, height:22, borderRadius:6, border:`1px solid ${M.line}`, background:M.card, display:'flex', alignItems:'center', justifyContent:'center', cursor:i===0?'not-allowed':'pointer', opacity:i===0?0.3:1 }}>
                        <I name="arrowUp" size={11}/>
                      </button>
                      <button className="m-tap" onClick={() => move(i, 1)} style={{ width:26, height:22, borderRadius:6, border:`1px solid ${M.line}`, background:M.card, display:'flex', alignItems:'center', justifyContent:'center', cursor:i===secs.length-1?'not-allowed':'pointer', opacity:i===secs.length-1?0.3:1 }}>
                        <I name="arrowDn" size={11}/>
                      </button>
                    </div>
                  )}
                </div>
                {i < secs.length-1 && <Divider inset={16}/>}
              </React.Fragment>
            );
          })}
        </div>
        <div style={{ marginTop:14, padding:14, borderRadius:12, background:M.sageSoft, display:'flex', gap:10 }}>
          <I name="help" size={16} color={M.sage}/>
          <div style={{ fontSize:12, color:M.ink2, lineHeight:1.5, flex:1 }}>
            "This period" and "Category review" are always shown and cannot be hidden.
          </div>
        </div>
      </div>
    </div>
  );

const ordinal = (n) => {
  const v = n % 100;
  return n + (['th','st','nd','rd'][(v-20)%10] || ['th','st','nd','rd'][v] || 'th');
};

  const nav   = useNav();

  const paid      = costs.filter(r => r.txIds?.length).reduce((s, r) => s + Math.abs(r.amount), 0);

  const luxTotal  = subs.reduce((s, r) => s + Math.abs(r.amount), 0);

function ScreenBudgets() {
  const nav = useNav();
  const sorted = [...BUDGETS].sort((a, b) => {
    const ra = a.spent / a.total;
    const rb = b.spent / b.total;
    return rb - ra;
  });

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Budgets"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}

      />
      <div className="m-body-scroll">
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {sorted.map(b => <BudgetCard key={b.id} b={b} onClick={() => nav.push('budgetDetail', { id: b.id })}/>)}
        </div>

        <button className="m-btn outline m-tap" style={{ width: '100%', marginTop: 18 }} onClick={() => nav.push('budgetCreate')}>
          <I name="plus" size={16}/> New budget
        </button>
      </div>
    </div>
  );
}

const budgetColor = (ratio) => {
  const left = 1 - ratio;
  if (ratio > 1)    return '#8B1A1A';
  if (left <= 0.10) return M.clay;
  if (left <= 0.25) return '#B86422';
  if (left <= 0.50) return M.ochre;
  return M.sage;
};
const budgetSoft = (ratio) => {
  const left = 1 - ratio;
  if (ratio > 1)    return '#F5D5D5';
  if (left <= 0.10) return M.claySoft;
  if (left <= 0.25) return '#F5E6D3';
  if (left <= 0.50) return M.ochreSoft;
  return M.sageSoft;
};

function BudgetCard({ b, onClick }) {
  const ratio = b.spent / b.total;
  const over = ratio > 1;
  const color = budgetColor(ratio);
  const soft  = budgetSoft(ratio);
  const left  = b.total - b.spent;
  const status = { color, soft, label: over ? `${fmtEur(Math.abs(left)).replace('−','')} over` : `${fmtEur(left)} left` };
  const remaining = Math.max(0, b.total - b.spent);
  const pct = Math.min(100, ratio * 100);

  return (
    <div className="m-card m-tap" onClick={onClick} style={{ padding: 16, border: `1px solid ${M.line}` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <div style={{ width: 38, height: 38, borderRadius: 10, background: status.soft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <I name={b.icon} size={18} color={status.color}/>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
            <div style={{ fontSize: 15, fontWeight: 600 }}>{b.name}</div>
            <div className="m-num" style={{ fontSize: 14, fontWeight: 600, color: status.color }}>{status.label}</div>
          </div>
          <div style={{ fontSize: 11, color: M.ink3, marginTop: 2 }}>{b.period} · resets {b.renew}</div>
        </div>
      </div>
      <div style={{ marginTop: 12, height: 6, borderRadius: 999, background: M.line2, overflow: 'hidden', position: 'relative' }}>
        <div style={{ width: `${Math.min(100, pct)}%`, height: '100%', background: status.color, borderRadius: 999 }}/>
        {over && <div style={{ position: 'absolute', inset: 0, background: `repeating-linear-gradient(45deg, transparent 0 4px, rgba(255,255,255,0.3) 4px 8px)` }}/>}
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 6, fontSize: 11, color: M.ink3 }}>
        <span><span className="m-num" style={{ color: M.ink2, fontWeight: 600 }}>{fmtEur(b.spent)}</span> spent</span>
        <span>of {fmtEur(b.total)}</span>
      </div>
      {b.stack && (
        <div style={{ marginTop: 10, padding: '8px 10px', borderRadius: 8, background: M.paper2, fontSize: 11, color: M.ink2, display: 'flex', alignItems: 'center', gap: 8 }}>
          <I name="box" size={13} color={M.ink3}/>
          Carry-over: <span className="m-num" style={{ fontWeight: 600 }}>{fmtEur(b.stackCur)}</span> · max <span className="m-num">{fmtEur(b.stackMax)}</span>
        </div>
      )}
    </div>
  );
}

function ScreenBudgetDetail({ params }) {
  const nav = useNav();
  const b = BUDGETS.find(x => x.id === params?.id) || BUDGETS[0];
  const [editMode, setEditMode] = React.useState(false);

  const txs   = TRANSACTIONS.filter(t => b.cats.includes(t.cat));

  const color = budgetColor(ratio);
  const soft  = budgetSoft(ratio);
  const left  = b.total - b.spent;

  const periodLabels = ['20 Oct – 2 Nov', '3 Nov – 9 Nov', '10 Nov – 16 Nov', '17 Nov – 23 Nov', '24 Nov – 30 Nov', '31 Nov – 6 Dec'];
  const periodLabel  = periodLabels[Math.max(0, periodLabels.length - 1 + pOffset)];

  return (

        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}

      <div className="m-body-scroll">

        <div style={{ display:'flex', justifyContent:'center', alignItems:'center', gap:12, padding:'0 0 14px', flexShrink:0 }}>

          <div style={{ fontSize:13, fontWeight:600, minWidth:140, textAlign:'center' }}>{periodLabel}</div>
          <button className="m-iconbtn m-tap" onClick={() => setPOffset(o => Math.min(0, o + 1))} style={{ opacity:isCurrent?0.3:1 }}>
            <I name="arrowR" size={16}/>
          </button>
          {!isCurrent && (
            <button className="m-tap" onClick={() => setPOffset(0)} style={{ fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:999, background:M.sageSoft, color:M.sage, border:'none', fontFamily:M.fontUI, cursor:'pointer' }}>Now</button>
          )}
        </div>

        {editMode ? (
          <div className="m-card" style={{ padding:4, marginBottom:14, border:`1px solid ${M.sage}` }}>

            <FormRow label="Categories" value={b.cats.length + ' selected'} caretR/>
          </div>
        ) : (
          <div className="m-card" style={{ padding:18, marginBottom:14, border:`1px solid ${over?'#F5D5D5':M.line}` }}>
            <div style={{ display:'flex', alignItems:'center', gap:14 }}>
              <div style={{ width:84, height:84, position:'relative' }}>
                <Donut size={84} thickness={10} data={[
                  { value:Math.min(b.spent, b.total), color },
                  { value:Math.max(0, b.total - b.spent), color:M.line2 },
                ]} center={
                  <div style={{ textAlign:'center' }}>
                    <div className="m-num" style={{ fontSize:15, fontWeight:700, color }}>{(ratio*100).toFixed(0)}%</div>
                  </div>
                }/>
              </div>
              <div style={{ flex:1 }}>
                <div className="m-cap">Spent of {fmtEur(b.total)}</div>
                <div className="m-num" style={{ fontSize:26, fontWeight:600, fontFamily:M.fontDisp, marginTop:4, color:over?color:M.ink }}>{fmtEur(b.spent)}</div>
                <div style={{ fontSize:12, color:over?color:M.ink3, marginTop:4, fontWeight:over?600:400 }}>
                  {over ? `${fmtEur(Math.abs(left))} over budget` : `${fmtEur(left)} remaining`}

              </div>
            </div>
          </div>
        )}

        <div className="m-cap" style={{ marginBottom:8, paddingLeft:4 }}>Categories</div>
        <div className="m-card" style={{ padding:'4px 16px', marginBottom:14, border:`1px solid ${M.line}` }}>
          {b.cats.map((cId, i) => {
            const c = CATEGORIES[cId];
            const cTotal = TRANSACTIONS.filter(t => t.cat === cId).reduce((s, t) => s + Math.abs(t.amount), 0);
            return (
              <React.Fragment key={cId}>
                <div style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 0' }}>
                  <I name={c.icon} size={16} color={M.ink2}/>

                  <div className="m-num" style={{ fontSize:14, fontWeight:600 }}>{fmtEur(cTotal)}</div>

          })}

        {editMode && (
          <button className="m-btn sage m-tap" style={{ width:'100%', marginBottom:14 }} onClick={() => setEditMode(false)}>
            Save changes

        <div className="m-cap" style={{ marginBottom:8, paddingLeft:4 }}>Transactions · {txs.length}</div>
        <div className="m-card" style={{ padding:'0 16px', marginBottom:18, border:`1px solid ${M.line}` }}>

              {i < a.length-1 && <Divider inset={50}/>}

          ))}
        </div>
      </div>
    </div>
  );
}
