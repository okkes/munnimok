<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>munni — finance app</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #2A2823; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
// ── ios-frame.jsx ──────────────────────────────────────────────

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 10 }}>
        <IOSStatusBar dark={dark} />
      </div>
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}
  </script>

  <script type="text/babel">
// ── theme.jsx ──────────────────────────────────────────────────

const M = {
  paper:   '#F7F4EE',
  paper2:  '#EFEAE0',
  card:    '#FFFFFF',
  ink:     '#1B1A17',
  ink2:    '#3D3A33',
  ink3:    '#6B6558',
  ink4:    '#9A9384',
  line:    '#E2DCCE',
  line2:   '#EFEAE0',
  sage:    '#4A6A4F',
  sageDk:  '#2F4A33',
  sageSoft:'#DDE6DA',
  clay:    '#B5503A',
  claySoft:'#F2DDD3',
  ochre:   '#A8782B',
  ochreSoft:'#F0E2C2',
  slate:   '#3F4E63',
  slateSoft:'#DDE2EA',
  violet:   '#5E4A78',
  violetSoft:'#E3DCED',

  fontUI:    "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif",
  fontDisp:  "'Source Serif 4', 'Source Serif Pro', Georgia, serif",
  fontMono:  "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace",
};

if (typeof document !== 'undefined' && !document.getElementById('m-styles')) {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap';
  document.head.appendChild(link);

  const s = document.createElement('style');
  s.id = 'm-styles';
  s.textContent = `
    .m, .m * { box-sizing: border-box; }
    .m-app { font-family: ${M.fontUI}; color: ${M.ink}; background: ${M.paper}; -webkit-font-smoothing: antialiased; }
    .m-num { font-family: ${M.fontDisp}; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .m-mono { font-family: ${M.fontMono}; }
    .m-row { display: flex; align-items: center; }
    .m-col { display: flex; flex-direction: column; }
    .m-card { background: ${M.card}; border-radius: 16px; }
    .m-card-bordered { background: ${M.card}; border: 1px solid ${M.line}; border-radius: 16px; }
    .m-divider { height: 1px; background: ${M.line2}; }
    .m-cap { font-size: 11px; color: ${M.ink3}; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
    .m-label { font-size: 12px; color: ${M.ink3}; }
    .m-chip { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; border:1px solid ${M.line}; background:${M.card}; color:${M.ink2}; }
    .m-pill { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:10px; font-weight:600; letter-spacing:0.02em; }
    .m-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:48px; padding:0 22px; border-radius:14px; font-size:15px; font-weight:600; border:none; background:${M.ink}; color:${M.paper}; cursor:pointer; transition: transform 0.1s, opacity 0.15s; font-family: ${M.fontUI}; }
    .m-btn:active { transform: scale(0.98); opacity: 0.9; }
    .m-btn.outline { background:transparent; color:${M.ink}; border:1px solid ${M.line}; }
    .m-btn.ghost { background:transparent; color:${M.ink}; }
    .m-btn.sage { background:${M.sage}; color:#fff; }
    .m-btn.sm { height: 36px; padding: 0 14px; font-size: 13px; border-radius: 10px; }
    .m-input { height:48px; border:1px solid ${M.line}; border-radius:12px; padding:0 16px; font-size:15px; background:${M.card}; color:${M.ink}; display:flex; align-items:center; gap:8px; font-family: ${M.fontUI}; }
    .m-input.empty { color:${M.ink4}; }
    .m-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: ${M.ink3}; }
    .m-h1 { font-family: ${M.fontDisp}; font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
    .m-h2 { font-family: ${M.fontDisp}; font-size: 24px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }
    .m-h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .m-body { font-size: 14px; color: ${M.ink2}; line-height: 1.45; }
    .m-tap { cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .m-tap:active { opacity: 0.7; transform: scale(0.98); }
    .m-screen { width:100%; height:100%; background:${M.paper}; color:${M.ink}; font-family:${M.fontUI}; display:flex; flex-direction:column; overflow:hidden; }
    .m-body-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 20px 24px; }
    .m-body-scroll::-webkit-scrollbar { display: none; }
    .m-appbar { display:flex; align-items:center; justify-content:space-between; padding: 8px 16px 12px; gap: 8px; flex-shrink: 0; }
    .m-iconbtn { width:36px; height:36px; border-radius:999px; background:transparent; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:${M.ink}; }
    .m-iconbtn.filled { background:${M.card}; border:1px solid ${M.line}; }
    @keyframes mFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .m-fade { animation: mFadeIn 0.28s ease-out both; }
    .m-logo { font-family: ${M.fontDisp}; font-weight: 600; letter-spacing: -0.04em; }
    .m-logo .dot { color: ${M.sage}; }
  `;
  document.head.appendChild(s);
}

function I({ name, size = 20, color = 'currentColor', stroke = 1.6 }) {
  const p = { stroke: color, strokeWidth: stroke, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const f = { fill: color, stroke: 'none' };
  const w = (kids) => <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block', flexShrink: 0 }}>{kids}</svg>;
  switch (name) {
    case 'home': return w(<path d="M3.5 11.5L12 4l8.5 7.5V20a1 1 0 01-1 1h-4.5v-6h-6v6H4.5a1 1 0 01-1-1z" {...p}/>);
    case 'list': return w(<><path d="M4 7h16M4 12h16M4 17h12" {...p}/></>);
    case 'star': return w(<path d="M12 4l2.4 5.4L20 10l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-.6z" {...p}/>);
    case 'user': return w(<><circle cx="12" cy="9" r="3.5" {...p}/><path d="M5 20c1.2-3.4 4-5 7-5s5.8 1.6 7 5" {...p}/></>);
    case 'plus': return w(<path d="M12 5v14M5 12h14" {...p}/>);
    case 'minus': return w(<path d="M5 12h14" {...p}/>);
    case 'check': return w(<path d="M5 12.5l4 4 10-10" {...p}/>);
    case 'x': return w(<path d="M6 6l12 12M18 6L6 18" {...p}/>);
    case 'arrowR': return w(<path d="M9 5l7 7-7 7" {...p}/>);

// ── charts.jsx ─────────────────────────────────────────────────

function Sparkline({ data, width = 60, height = 20, color = M.ink, fill, strokeWidth = 1.5 }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const pts = data.map((v, i) => [i * stepX, height - ((v - min) / range) * height]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = fill ? `${d} L${width},${height} L0,${height} Z` : null;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      {fill && <path d={fillD} fill={fill} stroke="none"/>}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function BarChart({ data, labels, width = 280, height = 96, highlightLast = true, color = M.ink, accent = M.sage }) {
  const max = Math.max(...data, 1);
  const padding = 6;
  const barAreaH = height - 18;
  const barW = (width - padding * (data.length - 1)) / data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      {data.map((v, i) => {
        const h = (v / max) * (barAreaH - 4);
        const x = i * (barW + padding);
        const y = barAreaH - h;
        const isLast = i === data.length - 1;
        return (
          <g key={i}>
            <rect x={x} y={y} width={barW} height={h} rx={3}
              fill={highlightLast && isLast ? accent : color}
              opacity={highlightLast && !isLast ? 0.18 : 0.92}/>
            {labels && <text x={x + barW / 2} y={height - 2} fontSize="9" fill={M.ink4} textAnchor="middle" fontFamily={M.fontUI} fontWeight="500">{labels[i]}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function Donut({ data, size = 130, thickness = 18, center }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={M.line2} strokeWidth={thickness}/>
        {data.map((d, i) => {
          const dash = (d.value / total) * (2 * Math.PI * r);
          const offset = (acc / total) * (2 * Math.PI * r);
          acc += d.value;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none"
              stroke={d.color} strokeWidth={thickness}
              strokeDasharray={`${dash} ${2 * Math.PI * r}`}
              strokeDashoffset={-offset}
              strokeLinecap="butt"/>
          );
        })}
      </svg>
      {center && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
          {center}
        </div>
      )}
    </div>
  );
}

function StackedBar({ segments, height = 8, radius = 999 }) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  return (
    <div style={{
      display: 'flex', height, borderRadius: radius,
      overflow: 'hidden', background: M.line2,
    }}>
      {segments.map((s, i) => (
        <div key={i} style={{
          width: `${(s.value / total) * 100}%`,
          background: s.color,
          borderRight: i < segments.length - 1 ? `1.5px solid ${M.paper}` : 'none',
        }}/>
      ))}
    </div>
  );
}

function LineChart({ data, width = 320, height = 120, color = M.sage, fill = 'rgba(74,106,79,0.10)', dots = false }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const padding = 4;
  const stepX = (width - padding * 2) / (data.length - 1);
  const pts = data.map((v, i) => [padding + i * stepX, padding + (height - padding * 2) * (1 - (v - min) / range)]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = `${d} L${pts[pts.length - 1][0]},${height} L${pts[0][0]},${height} Z`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <path d={fillD} fill={fill} stroke="none"/>
      <path d={d} fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
      {dots && pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3 : 0} fill={color}/>
      ))}
    </svg>
  );
}

function TxRow({ tx, onClick, showCat = true, showDate = false, dense = false }) {
  const cat = CATEGORIES[tx.cat] || {};

function BudgetMini({ b, onClick }) {
  const ratio = b.spent / b.total;
  const over = ratio > 1;
  const close = ratio >= 0.8 && !over;
  const color = over ? M.clay : (close ? M.ochre : M.sage);
  const left = b.total - b.spent;
  return (
    <div className="m-tap" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 32, height: 32, borderRadius: 9, background: over ? M.claySoft : (close ? M.ochreSoft : M.sageSoft), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <I name={b.icon} size={16} color={color}/>
      </div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
          <div style={{ fontSize: 13, fontWeight: 500 }}>{b.name}</div>
          <div className="m-num" style={{ fontSize: 12, fontWeight: 600, color: over ? M.clay : M.ink2 }}>
            {over ? `−${fmtEurInt(Math.abs(left))}` : `${fmtEurInt(left)} left`}
          </div>
        </div>
        <div style={{ height: 5, marginTop: 6, borderRadius: 999, background: M.line2, overflow: 'hidden', display: 'flex' }}>
          <div style={{ width: `${Math.min(100, ratio * 100)}%`, height: '100%', background: color }}/>
          {over && <div style={{ flex: 1, background: `repeating-linear-gradient(45deg, ${M.clay} 0 3px, ${M.claySoft} 3px 6px)` }}/>}
        </div>
      </div>
    </div>
  );
}

function GoalCard({ g, onClick }) {
  const pct = (g.current / g.target) * 100;
  return (
    <div className="m-tap" onClick={onClick} style={{
      flexShrink: 0, width: 168, padding: 14, borderRadius: 14, background: M.paper2,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <div style={{ width: 28, height: 28, borderRadius: 8, background: M.card, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <I name={g.icon} size={14} color={g.color}/>
        </div>
        <div style={{ fontSize: 12, fontWeight: 600 }}>{g.name}</div>
      </div>
      <div className="m-num" style={{ fontSize: 18, fontWeight: 600 }}>{fmtEurInt(g.current)}</div>
      <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>of {fmtEurInt(g.target)} · by {g.by}</div>
      <div style={{ height: 4, marginTop: 10, borderRadius: 999, background: M.line, overflow: 'hidden' }}>
        <div style={{ width: `${pct}%`, height: '100%', background: g.color }}/>
      </div>
      <div style={{ fontSize: 10, color: M.ink3, marginTop: 6, fontWeight: 500 }}>{pct.toFixed(0)}% · +{fmtEurInt(g.monthly)}/mo</div>
    </div>
  );
}

  <script type="text/babel">

function DetailRow({ label, value, icon, mono, placeholder, caretR }) {
  return (

    </div>

}

function ScreenExpenses() {
  const nav = useNav();
  const totals = {};
  TRANSACTIONS.filter(t => t.amount < 0).forEach(t => {
    const c = CATEGORIES[t.cat];
    const grp = c?.parent || c?.id;
    if (!totals[grp]) totals[grp] = { id: grp, name: CATEGORIES[grp]?.name || c?.group || c?.name, icon: CATEGORIES[grp]?.icon || c?.icon, total: 0, subs: {} };
    totals[grp].total += Math.abs(t.amount);
    if (c?.parent) {
      if (!totals[grp].subs[c.id]) totals[grp].subs[c.id] = { id: c.id, name: c.name, total: 0, count: 0 };
      totals[grp].subs[c.id].total += Math.abs(t.amount);
      totals[grp].subs[c.id].count += 1;
    }
  });
  const consumptions = { id: 'consumptions', name: 'Consumptions', icon: 'shop', total: 0, subs: {} };
  ['restaurants','groceries','coffee'].forEach(id => {
    const t = TRANSACTIONS.filter(x => x.cat === id).reduce((s, x) => s + Math.abs(x.amount), 0);
    if (t > 0) {
      consumptions.total += t;
      consumptions.subs[id] = { id, name: CATEGORIES[id].name, total: t, count: TRANSACTIONS.filter(x => x.cat === id).length };
    }
    delete totals[id];
  });
  totals.consumptions = consumptions;

  const cats = Object.values(totals).sort((a, b) => b.total - a.total);
  const grandTotal = cats.reduce((s, c) => s + c.total, 0);
  const [expanded, setExpanded] = React.useState({ consumptions: true });

  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Expenses"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        trailing={<button className="m-iconbtn m-tap"><I name="filter" size={20}/></button>}
      />
      <div className="m-body-scroll">
        <div style={{ textAlign: 'center', padding: '8px 0 22px' }}>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 16, alignItems: 'center', color: M.ink3, marginBottom: 8 }}>
            <button className="m-iconbtn m-tap"><I name="arrowL" size={16}/></button>
            <div style={{ fontSize: 13, fontWeight: 600, color: M.ink2 }}>20 Jan – 19 Feb</div>
            <button className="m-iconbtn m-tap"><I name="arrowR" size={16} color={M.ink4}/></button>
          </div>
          <div className="m-num" style={{ fontSize: 40, fontWeight: 600, letterSpacing: '-0.025em' }}>{fmtEur(grandTotal)}</div>
          <div style={{ fontSize: 12, color: M.clay, marginTop: 4, fontWeight: 500 }}>+€88 vs previous period</div>
        </div>

        <StackedBar height={10} segments={cats.map((c, i) => ({
          value: c.total, color: [M.sage, M.clay, M.ochre, M.violet, M.slate, M.ink3][i % 6],
        }))}/>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 14, marginBottom: 18 }}>
          {cats.map((c, i) => (
            <div key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 11, color: M.ink2 }}>
              <div style={{ width: 7, height: 7, borderRadius: 2, background: [M.sage, M.clay, M.ochre, M.violet, M.slate, M.ink3][i % 6] }}/>
              {c.name}
            </div>
          ))}
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {cats.map(c => {
            const subs = Object.values(c.subs);
            const isOpen = expanded[c.id];
            const pct = (c.total / grandTotal) * 100;
            return (
              <div key={c.id} className="m-card" style={{ border: `1px solid ${M.line}`, overflow: 'hidden' }}>
                <div className="m-tap" onClick={() => subs.length > 0 && setExpanded({ ...expanded, [c.id]: !isOpen })}
                  style={{ padding: '14px 16px', display: 'flex', alignItems: 'center', gap: 12 }}>
                  <div style={{ width: 36, height: 36, borderRadius: 10, background: M.paper2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <I name={c.icon || 'box'} size={18} color={M.ink2}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <div style={{ fontSize: 14, fontWeight: 600 }}>{c.name}</div>
                      <div className="m-num" style={{ fontSize: 14, fontWeight: 600 }}>{fmtEur(c.total)}</div>
                    </div>
                    <div style={{ display: 'flex', gap: 8, marginTop: 6 }}>
                      <div style={{ flex: 1, height: 4, borderRadius: 999, background: M.line2, overflow: 'hidden' }}>
                        <div style={{ width: `${pct}%`, height: '100%', background: M.ink2 }}/>
                      </div>
                      <div style={{ fontSize: 11, color: M.ink3, fontWeight: 500, minWidth: 28, textAlign: 'right' }}>{pct.toFixed(0)}%</div>
                    </div>
                  </div>
                  {subs.length > 0 && <I name={isOpen ? 'arrowDn' : 'caretR'} size={14} color={M.ink4}/>}
                </div>
                {isOpen && subs.length > 0 && (
                  <div style={{ background: M.paper2, padding: '4px 0' }}>
                    {subs.map((s, i, a) => (
                      <React.Fragment key={s.id}>
                        <div className="m-tap" onClick={() => nav.push('categoryDrill', { id: s.id })}
                          style={{ padding: '12px 16px 12px 64px', display: 'flex', alignItems: 'center', gap: 10 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                              <div style={{ fontSize: 13, fontWeight: 500 }}>{s.name}</div>
                              <div className="m-num" style={{ fontSize: 13, fontWeight: 600 }}>{fmtEur(s.total)}</div>
                            </div>
                            <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{s.count} transactions</div>
                          </div>
                          <I name="caretR" size={12} color={M.ink4}/>
                        </div>
                        {i < a.length - 1 && <Divider inset={64}/>}
                      </React.Fragment>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ScreenCategoryDrill({ params }) {
  const nav = useNav();
  const cat = CATEGORIES[params?.id] || CATEGORIES.restaurants;
  const txs = TRANSACTIONS.filter(t => t.cat === cat.id);

function EventCard({ ev, onClick }) {
  const palette = {
    globe:    { bg: '#3F4E63', accent: '#DDE2EA' },
    star:     { bg: '#A8782B', accent: '#F0E2C2' },
    flame:    { bg: '#A86A4F', accent: '#F0DBC8' },
    cal:      { bg: '#5C4977', accent: '#E3DCED' },
  };
  const p = palette[ev.icon] || palette.globe;
  const status = ({
    active:   { label: 'Active',   bg: '#DCEDDF', color: '#2E5A33' },
    closed:   { label: 'Closed',   bg: '#EAE7E1', color: '#6E6657' },
    planning: { label: 'Planning', bg: '#F0E2C2', color: '#7A5C20' },
    upcoming: { label: 'Upcoming', bg: '#DDE2EA', color: '#3F4E63' },
  }[ev.status]) || { label: ev.status || 'Draft', bg: '#EAE7E1', color: '#6E6657' };

  return (
    <div className="m-card m-tap" onClick={onClick} style={{ overflow: 'hidden', border: `1px solid ${M.line}` }}>
      <div style={{
        height: 120, background: `linear-gradient(135deg, ${p.bg} 0%, ${p.bg}dd 100%)`,

  <script type="text/babel">
// ── screens-review.jsx ─────────────────────────────────────────

function ScreenReviewSwipe() {
  const nav = useNav();
  const queue = TRANSACTIONS.filter(t => t.needsReview);
  const [idx, setIdx] = React.useState(0);
  const [picking, setPicking] = React.useState(false);
  const [drag, setDrag] = React.useState(0);
  const [done, setDone] = React.useState(false);

  if (queue.length === 0 || done || idx >= queue.length) {
    return (
      <div className="m-screen" style={{ background: M.paper }}>
        <StatusBar/>
        <AppBar title="Review"
          leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
        />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: 32, textAlign: 'center', gap: 12 }}>
          <div style={{ width: 80, height: 80, borderRadius: 24, background: M.sageSoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <I name="check" size={36} color={M.sage} stroke={2.5}/>
          </div>
          <div className="m-h2" style={{ marginTop: 8 }}>All caught up</div>
          <div style={{ fontSize: 14, color: M.ink3, lineHeight: 1.5, maxWidth: 260 }}>
            Nice work. We'll let you know when new transactions need a quick review.
          </div>
          <button className="m-btn m-tap" style={{ marginTop: 16 }} onClick={() => nav.pop()}>Done</button>
        </div>
      </div>
    );
  }

  const tx = queue[idx];
  const cat = CATEGORIES[tx.cat] || {};

  const handleConfirm = () => {
    setDrag(160);
    setTimeout(() => {
      if (idx + 1 >= queue.length) setDone(true);
      else setIdx(idx + 1);
      setDrag(0);
    }, 200);
  };
  const handleSkip = () => {
    setDrag(-160);
    setTimeout(() => {
      if (idx + 1 >= queue.length) setDone(true);
      else setIdx(idx + 1);
      setDrag(0);
    }, 200);
  };

  return (
    <div className="m-screen" style={{ background: M.paper2 }}>
      <StatusBar/>
      <AppBar title={`Review · ${idx + 1}/${queue.length}`}
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="x" size={20}/></button>}
        trailing={<button className="m-tap" style={{ background: 'transparent', border: 'none', fontSize: 13, fontWeight: 500, color: M.ink3 }} onClick={handleSkip}>Skip</button>}
      />

      <div style={{ display: 'flex', justifyContent: 'center', gap: 4, padding: '0 20px 16px', flexShrink: 0 }}>
        {queue.map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 3, borderRadius: 999,
            background: i < idx ? M.sage : i === idx ? M.ink : M.line2,
          }}/>
        ))}
      </div>

      <div style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '0 20px', position: 'relative' }}>
        <div className="m-card" style={{
          width: '100%', padding: 24, border: `1px solid ${M.line}`,
          background: '#fff',
          transform: `translateX(${drag}px) rotate(${drag * 0.04}deg)`,
          opacity: 1 - Math.abs(drag) / 400,
          transition: drag === 0 ? 'transform 0.3s, opacity 0.3s' : 'transform 0.2s, opacity 0.2s',
          boxShadow: '0 8px 30px rgba(0,0,0,0.06)',
        }}>
          <div style={{ textAlign: 'center' }}>
            <div className="m-num" style={{ fontSize: 36, fontWeight: 600, fontFamily: M.fontDisp, color: tx.amount > 0 ? M.sage : M.ink, letterSpacing: '-0.02em' }}>
              {tx.amount > 0 ? '+' : '−'}{fmtEur(Math.abs(tx.amount))}
            </div>
            <div className="m-h3" style={{ marginTop: 12, fontSize: 18 }}>{tx.merchant}</div>
            <div style={{ fontSize: 12, color: M.ink3, marginTop: 4 }}>{fmtDate(tx.date, 'long')} · {tx.time}</div>
            <div style={{ fontSize: 11, color: M.ink4, fontFamily: M.fontMono, marginTop: 8 }}>{tx.desc}</div>
          </div>

          <div style={{ marginTop: 28, padding: '14px 16px', borderRadius: 14, background: M.paper2, border: `1px solid ${M.line2}` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 10 }}>
              <div style={{ width: 14, height: 14, borderRadius: 999, background: M.violet, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <div style={{ width: 4, height: 4, borderRadius: 999, background: '#fff' }}/>
              </div>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: '0.06em', textTransform: 'uppercase', color: M.violet }}>AI guess · {tx.confidence}%</div>
            </div>
            <div className="m-tap" onClick={() => setPicking(true)} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: 12, borderRadius: 10,
              background: '#fff', border: `1px solid ${M.line}`,
            }}>
              <div style={{ width: 36, height: 36, borderRadius: 10, background: M.paper2, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <I name={cat.icon} size={18} color={M.ink2}/>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 600 }}>{cat.name}</div>
                <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{cat.group}</div>
              </div>
              <span style={{ fontSize: 11, color: M.sage, fontWeight: 600 }}>Change</span>
            </div>
          </div>
        </div>
      </div>

      <div style={{ display: 'flex', gap: 12, padding: '12px 20px 20px', flexShrink: 0 }}>
        <button className="m-tap" onClick={handleSkip} style={{
          flex: 1, height: 56, borderRadius: 16, border: `1px solid ${M.line}`,
          background: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          fontSize: 14, fontWeight: 600, color: M.ink3,
        }}>
          <I name="x" size={18} color={M.ink3}/> Skip
        </button>
        <button className="m-tap" onClick={handleConfirm} style={{
          flex: 2, height: 56, borderRadius: 16, border: 'none',
          background: M.sage, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
          fontSize: 14, fontWeight: 600,
        }}>
          <I name="check" size={20} color="#fff" stroke={2.5}/> Confirm
        </button>
      </div>

      {picking && <CategoryPicker selected={tx.cat} onClose={() => setPicking(false)} onPick={() => setPicking(false)}/>}
    </div>
  );
}

function CategoryPicker({ selected, onClose, onPick }) {
  const groups = {};
  Object.values(CATEGORIES).forEach(c => {
    if (!groups[c.group]) groups[c.group] = [];
    groups[c.group].push(c);
  });

  return (
    <div style={{ position: 'absolute', inset: 0, zIndex: 100, animation: 'mFadeIn 0.2s ease-out both' }}>
      <div style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.4)' }} onClick={onClose}/>
      <div style={{
        position: 'absolute', left: 0, right: 0, bottom: 0, top: 80,
        background: '#fff', borderTopLeftRadius: 24, borderTopRightRadius: 24,
        display: 'flex', flexDirection: 'column', overflow: 'hidden',
      }}>
        <div style={{ padding: '14px 20px 12px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', borderBottom: `1px solid ${M.line2}` }}>
          <button className="m-tap" onClick={onClose} style={{ background: 'transparent', border: 'none', fontSize: 14, color: M.ink3 }}>Cancel</button>
          <div style={{ fontSize: 15, fontWeight: 600 }}>Pick category</div>
          <div style={{ width: 50 }}/>
        </div>
        <div style={{ padding: 12, flexShrink: 0 }}>
          <div className="m-input" style={{ background: M.paper2, border: 'none' }}>
            <I name="search" size={16} color={M.ink3}/>
            <span style={{ color: M.ink4 }}>Search categories…</span>
          </div>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '0 20px 20px' }}>
          {Object.entries(groups).map(([groupName, cats]) => (
            <div key={groupName} style={{ marginBottom: 18 }}>
              <div className="m-cap" style={{ marginBottom: 8 }}>{groupName}</div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                {cats.map(c => (
                  <button key={c.id} onClick={onPick} className="m-tap" style={{
                    padding: '12px 14px', borderRadius: 12, border: `1px solid ${selected === c.id ? M.sage : M.line}`,
                    background: selected === c.id ? M.sageSoft : '#fff',
                    display: 'flex', alignItems: 'center', gap: 10, textAlign: 'left',
                  }}>
                    <I name={c.icon} size={16} color={selected === c.id ? M.sage : M.ink2}/>
                    <span style={{ fontSize: 13, fontWeight: 500, color: M.ink, flex: 1 }}>{c.name}</span>
                    {selected === c.id && <I name="check" size={14} color={M.sage} stroke={2.5}/>}
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScreenLinkReimburse({ params }) {
  const nav = useNav();
  const candidates = TRANSACTIONS.filter(t => t.amount > 0).slice(0, 5);
  return (
    <div className="m-screen">
      <StatusBar/>
      <AppBar title="Link reimbursement"
        leading={<button className="m-iconbtn m-tap" onClick={() => nav.pop()}><I name="arrowL" size={20}/></button>}
      />
      <div className="m-body-scroll">
        <div style={{ padding: 14, borderRadius: 12, background: M.sageSoft, marginBottom: 16, fontSize: 13, color: M.sage, fontWeight: 500 }}>
          Suggested matches based on incoming tx in the same week.
        </div>
        <div className="m-card" style={{ padding: '0 16px', marginBottom: 14, border: `1px solid ${M.line}` }}>
          {candidates.map((t, i, a) => (
            <React.Fragment key={t.id}>
              <div className="m-tap" onClick={() => nav.pop()} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '14px 0' }}>
                <div style={{ width: 36, height: 36, borderRadius: 10, background: M.sageSoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <I name="arrow-dn-right" size={16} color={M.sage}/>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 500 }}>{t.merchant}</div>
                  <div style={{ fontSize: 11, color: M.ink3, marginTop: 2 }}>{fmtDate(t.date)}</div>
                </div>
                <div className="m-num" style={{ fontSize: 14, fontWeight: 600, color: M.sage }}>+{fmtEur(t.amount)}</div>
              </div>
              {i < a.length - 1 && <Divider inset={48}/>}
            </React.Fragment>
          ))}
        </div>
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel">
// ── app.jsx ────────────────────────────────────────────────────

const SCREEN_REGISTRY = {
  txDetail:       ({params}) => <ScreenTxDetail params={params}/>,
  expenses:       () => <ScreenExpenses/>,
  categoryDrill:  ({params}) => <ScreenCategoryDrill params={params}/>,
  linkReimburse:  ({params}) => <ScreenLinkReimburse params={params}/>,
  search:         () => <ScreenStub title="Search"/>,
  sync:           () => <ScreenStub title="Sync"/>,
  notifications:  () => <ScreenStub title="Notifications"/>,
  budgets:        () => <ScreenBudgets/>,
  budgetDetail:   ({params}) => <ScreenBudgetDetail params={params}/>,
  budgetCreate:   () => <ScreenBudgetCreate/>,
  goals:          () => <ScreenGoals/>,
  goalDetail:     ({params}) => <ScreenGoalDetail params={params}/>,
  reviewSwipe:    () => <ScreenReviewSwipe/>,
  allocate:       () => <ScreenAllocate/>,
  allocateTopic:  ({params}) => <ScreenAllocateTopic params={params}/>,
  investment:     () => <ScreenInvestment/>,
  investmentConnect: () => <ScreenInvestmentConnect/>,
  eventDetail:    ({params}) => <ScreenEventDetail params={params}/>,
  eventCreate:    () => <ScreenEventCreate/>,
  recurring:      () => <ScreenRecurring/>,
  accounts:       () => <ScreenAccounts/>,
  settings:       () => <ScreenSettings/>,
};

function TabRoot() {
  const nav = useNav();
  if (nav.tab === 'home') return <ScreenHome/>;
  if (nav.tab === 'tx') return <ScreenTransactions/>;
  if (nav.tab === 'events') return <ScreenEvents/>;
  if (nav.tab === 'profile') return <ScreenProfile/>;
  return null;
}

function Router() {
  const nav = useNav();
  return (
    <div style={{ position: 'relative', width: '100%', height: '100%', background: M.paper, overflow: 'hidden' }}>
      <TabRoot/>
      {nav.stack.map((entry, i) => {
        const Comp = SCREEN_REGISTRY[entry.screen];
        if (!Comp) return null;
        return (
          <div key={i} style={{
            position: 'absolute', inset: 0, background: M.paper,
            animation: 'mSlideIn 0.28s cubic-bezier(.2,.7,.2,1) both',
          }}>
            <Comp params={entry.params}/>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  return (
    <IOSDevice>
      <NavProvider initial="home">
        <div className="m m-app" style={{ width: '100%', height: '100%', background: M.paper }}>
          <Router/>
        </div>
      </NavProvider>
    </IOSDevice>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
