<!DOCTYPE html>
<html lang="en">
<head>

  <title>munni — finance app</title>
  <style>
    input, textarea, select { font-size: 16px !important; }
  .m-tap { touch-action: manipulation; }
  html, body { margin: 0; padding: 0; height: 100%; background: #2A2823; font-family: -apple-system, system-ui, sans-serif; overflow: hidden; overscroll-behavior: none; }
    #root { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
    @media (max-width: 430px) {
      html, body { background: #F7F4EE; }
      #root { height: 100dvh; align-items: stretch; justify-content: stretch; }

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
// ── ios-frame.jsx ──────────────────────────────────────────────

function IOSStatusBar({ dark = false, time = '9:41' }) {
  const c = dark ? '#fff' : '#000';
  return (
    <div style={{
      display: 'flex', gap: 154, alignItems: 'center', justifyContent: 'center',
      padding: '21px 24px 19px', boxSizing: 'border-box',
      position: 'relative', zIndex: 20, width: '100%',
    }}>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', paddingTop: 1.5 }}>
        <span style={{
          fontFamily: '-apple-system, "SF Pro", system-ui', fontWeight: 590,
          fontSize: 17, lineHeight: '22px', color: c,
        }}>{time}</span>
      </div>
      <div style={{ flex: 1, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7, paddingTop: 1, paddingRight: 1 }}>
        <svg width="19" height="12" viewBox="0 0 19 12">
          <rect x="0" y="7.5" width="3.2" height="4.5" rx="0.7" fill={c}/>
          <rect x="4.8" y="5" width="3.2" height="7" rx="0.7" fill={c}/>
          <rect x="9.6" y="2.5" width="3.2" height="9.5" rx="0.7" fill={c}/>
          <rect x="14.4" y="0" width="3.2" height="12" rx="0.7" fill={c}/>
        </svg>
        <svg width="17" height="12" viewBox="0 0 17 12">
          <path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c}/>
          <path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c}/>
          <circle cx="8.5" cy="10.5" r="1.5" fill={c}/>
        </svg>
        <svg width="27" height="13" viewBox="0 0 27 13">
          <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c} strokeOpacity="0.35" fill="none"/>
          <rect x="2" y="2" width="20" height="9" rx="2" fill={c}/>
          <path d="M25 4.5V8.5C25.8 8.2 26.5 7.2 26.5 6.5C26.5 5.8 25.8 4.8 25 4.5Z" fill={c} fillOpacity="0.4"/>
        </svg>
      </div>
    </div>
  );
}

function IOSGlassPill({ children, dark = false, style = {} }) {
  return (
    <div style={{
      height: 44, minWidth: 44, borderRadius: 9999,
      position: 'relative', overflow: 'hidden',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      boxShadow: dark
        ? '0 2px 6px rgba(0,0,0,0.35), 0 6px 16px rgba(0,0,0,0.2)'
        : '0 1px 3px rgba(0,0,0,0.07), 0 3px 10px rgba(0,0,0,0.06)',
      ...style,
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.28)' : 'rgba(255,255,255,0.5)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 9999,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15), inset -1px -1px 1px rgba(255,255,255,0.08)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
      }} />
      <div style={{ position: 'relative', zIndex: 1, display: 'flex', alignItems: 'center', padding: '0 4px' }}>
        {children}
      </div>
    </div>
  );
}

function IOSNavBar({ title = 'Title', dark = false, trailingIcon = true }) {
  const muted = dark ? 'rgba(255,255,255,0.6)' : '#404040';
  const text = dark ? '#fff' : '#000';
  const pillIcon = (content) => (
    <IOSGlassPill dark={dark}>
      <div style={{ width: 36, height: 36, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        {content}
      </div>
    </IOSGlassPill>
  );
  return (
    <div style={{
      display: 'flex', flexDirection: 'column', gap: 10,
      paddingTop: 62, paddingBottom: 10, position: 'relative', zIndex: 5,
    }}>
      <div style={{
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
        padding: '0 16px',
      }}>
        {pillIcon(
          <svg width="12" height="20" viewBox="0 0 12 20" fill="none" style={{ marginLeft: -1 }}>
            <path d="M10 2L2 10l8 8" stroke={muted} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
        {trailingIcon && pillIcon(
          <svg width="22" height="6" viewBox="0 0 22 6">
            <circle cx="3" cy="3" r="2.5" fill={muted}/>
            <circle cx="11" cy="3" r="2.5" fill={muted}/>
            <circle cx="19" cy="3" r="2.5" fill={muted}/>
          </svg>
        )}
      </div>
      <div style={{
        padding: '0 16px',
        fontFamily: '-apple-system, system-ui',
        fontSize: 34, fontWeight: 700, lineHeight: '41px',
        color: text, letterSpacing: 0.4,
      }}>{title}</div>
    </div>
  );
}

function IOSListRow({ title, detail, icon, chevron = true, isLast = false, dark = false }) {
  const text = dark ? '#fff' : '#000';
  const sec = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const ter = dark ? 'rgba(235,235,245,0.3)' : 'rgba(60,60,67,0.3)';
  const sep = dark ? 'rgba(84,84,88,0.65)' : 'rgba(60,60,67,0.12)';
  return (
    <div style={{
      display: 'flex', alignItems: 'center', minHeight: 52,
      padding: '0 16px', position: 'relative',
      fontFamily: '-apple-system, system-ui', fontSize: 17,
      letterSpacing: -0.43,
    }}>
      {icon && (
        <div style={{
          width: 30, height: 30, borderRadius: 7, background: icon,
          marginRight: 12, flexShrink: 0,
        }} />
      )}
      <div style={{ flex: 1, color: text }}>{title}</div>
      {detail && <span style={{ color: sec, marginRight: 6 }}>{detail}</span>}
      {chevron && (
        <svg width="8" height="14" viewBox="0 0 8 14" style={{ flexShrink: 0 }}>
          <path d="M1 1l6 6-6 6" stroke={ter} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      )}
      {!isLast && (
        <div style={{
          position: 'absolute', bottom: 0, right: 0,
          left: icon ? 58 : 16, height: 0.5, background: sep,
        }} />
      )}
    </div>
  );
}

function IOSList({ header, children, dark = false }) {
  const hc = dark ? 'rgba(235,235,245,0.6)' : 'rgba(60,60,67,0.6)';
  const bg = dark ? '#1C1C1E' : '#fff';
  return (
    <div>
      {header && (
        <div style={{
          fontFamily: '-apple-system, system-ui', fontSize: 13,
          color: hc, textTransform: 'uppercase',
          padding: '8px 36px 6px', letterSpacing: -0.08,
        }}>{header}</div>
      )}
      <div style={{
        background: bg, borderRadius: 26,
        margin: '0 16px', overflow: 'hidden',
      }}>{children}</div>
    </div>
  );
}

function IOSDevice({
  children, width = 402, height = 874, dark = false,
  title, keyboard = false,
}) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        {title !== undefined && <IOSNavBar title={title} dark={dark} />}
        <div style={{ flex: 1, overflow: 'auto' }}>{children}</div>
        {keyboard && <IOSKeyboard dark={dark} />}
      </div>
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

function IOSKeyboard({ dark = false }) {
  const glyph = dark ? 'rgba(255,255,255,0.7)' : '#595959';
  const sugg = dark ? 'rgba(255,255,255,0.6)' : '#333';
  const keyBg = dark ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.85)';

  const icons = {
    shift: <svg width="19" height="17" viewBox="0 0 19 17"><path d="M9.5 1L1 9.5h4.5V16h8V9.5H18L9.5 1z" fill={glyph}/></svg>,
    del: <svg width="23" height="17" viewBox="0 0 23 17"><path d="M7 1h13a2 2 0 012 2v11a2 2 0 01-2 2H7l-6-7.5L7 1z" fill="none" stroke={glyph} strokeWidth="1.6" strokeLinejoin="round"/><path d="M10 5l7 7M17 5l-7 7" stroke={glyph} strokeWidth="1.6" strokeLinecap="round"/></svg>,
    ret: <svg width="20" height="14" viewBox="0 0 20 14"><path d="M18 1v6H4m0 0l4-4M4 7l4 4" fill="none" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  };

  const key = (content, { w, flex, ret, fs = 25, k } = {}) => (
    <div key={k} style={{
      height: 42, borderRadius: 8.5,
      flex: flex ? 1 : undefined, width: w, minWidth: 0,
      background: ret ? '#08f' : keyBg,
      boxShadow: '0 1px 0 rgba(0,0,0,0.075)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontFamily: '-apple-system, "SF Compact", system-ui',
      fontSize: fs, fontWeight: 458, color: ret ? '#fff' : glyph,
    }}>{content}</div>
  );

  const row = (keys, pad = 0) => (
    <div style={{ display: 'flex', gap: 6.5, justifyContent: 'center', padding: `0 ${pad}px` }}>
      {keys.map(l => key(l, { flex: true, k: l }))}
    </div>
  );

  return (
    <div style={{
      position: 'relative', zIndex: 15, borderRadius: 27, overflow: 'hidden',
      padding: '11px 0 2px',
      display: 'flex', flexDirection: 'column', alignItems: 'center',
      boxShadow: dark
        ? '0 -2px 20px rgba(0,0,0,0.09)'
        : '0 -1px 6px rgba(0,0,0,0.018), 0 -3px 20px rgba(0,0,0,0.012)',
    }}>
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        backdropFilter: 'blur(12px) saturate(180%)',
        WebkitBackdropFilter: 'blur(12px) saturate(180%)',
        background: dark ? 'rgba(120,120,128,0.14)' : 'rgba(255,255,255,0.25)',
      }} />
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 27,
        boxShadow: dark
          ? 'inset 1.5px 1.5px 1px rgba(255,255,255,0.15)'
          : 'inset 1.5px 1.5px 1px rgba(255,255,255,0.7), inset -1px -1px 1px rgba(255,255,255,0.4)',
        border: dark ? '0.5px solid rgba(255,255,255,0.15)' : '0.5px solid rgba(0,0,0,0.06)',
        pointerEvents: 'none',
      }} />
      <div style={{
        display: 'flex', gap: 20, alignItems: 'center',
        padding: '8px 22px 13px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {['"The"', 'the', 'to'].map((w, i) => (
          <React.Fragment key={i}>
            {i > 0 && <div style={{ width: 1, height: 25, background: '#ccc', opacity: 0.3 }} />}
            <div style={{
              flex: 1, textAlign: 'center',
              fontFamily: '-apple-system, system-ui', fontSize: 17,
              color: sugg, letterSpacing: -0.43, lineHeight: '22px',
            }}>{w}</div>
          </React.Fragment>
        ))}
      </div>
      <div style={{
        display: 'flex', flexDirection: 'column', gap: 13,
        padding: '0 6.5px', width: '100%', boxSizing: 'border-box',
        position: 'relative',
      }}>
        {row(['q','w','e','r','t','y','u','i','o','p'])}
        {row(['a','s','d','f','g','h','j','k','l'], 20)}
        <div style={{ display: 'flex', gap: 14.25, alignItems: 'center' }}>
          {key(icons.shift, { w: 45, k: 'shift' })}
          <div style={{ display: 'flex', gap: 6.5, flex: 1 }}>
            {['z','x','c','v','b','n','m'].map(l => key(l, { flex: true, k: l }))}
          </div>
          {key(icons.del, { w: 45, k: 'del' })}
        </div>
        <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {key('ABC', { w: 92.25, fs: 18, k: 'abc' })}
          {key('', { flex: true, k: 'space' })}
          {key(icons.ret, { w: 92.25, ret: true, k: 'ret' })}
        </div>
      </div>
      <div style={{ height: 56, width: '100%', position: 'relative' }} />
    </div>
  );
}
  </script>

  <script type="text/babel">
// ── theme.jsx ──────────────────────────────────────────────────

const M = {
  paper:   '#F7F4EE',
  paper2:  '#EFEAE0',
  card:    '#FFFFFF',
  ink:     '#1B1A17',
  ink2:    '#3D3A33',
  ink3:    '#6B6558',
  ink4:    '#9A9384',
  line:    '#E2DCCE',
  line2:   '#EFEAE0',
  sage:    '#4A6A4F',
  sageDk:  '#2F4A33',
  sageSoft:'#DDE6DA',
  clay:    '#B5503A',
  claySoft:'#F2DDD3',
  ochre:   '#A8782B',
  ochreSoft:'#F0E2C2',
  slate:   '#3F4E63',
  slateSoft:'#DDE2EA',
  violet:   '#5E4A78',
  violetSoft:'#E3DCED',

  fontUI:    "'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif",
  fontDisp:  "'Source Serif 4', 'Source Serif Pro', Georgia, serif",
  fontMono:  "'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace",
};

if (typeof document !== 'undefined' && !document.getElementById('m-styles')) {
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500&display=swap';
  document.head.appendChild(link);

  const s = document.createElement('style');
  s.id = 'm-styles';
  s.textContent = `
    .m, .m * { box-sizing: border-box; }
    .m-app { font-family: ${M.fontUI}; color: ${M.ink}; background: ${M.paper}; -webkit-font-smoothing: antialiased; }
    .m-num { font-family: ${M.fontDisp}; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }
    .m-mono { font-family: ${M.fontMono}; }
    .m-row { display: flex; align-items: center; }
    .m-col { display: flex; flex-direction: column; }
    .m-card { background: ${M.card}; border-radius: 16px; }
    .m-card-bordered { background: ${M.card}; border: 1px solid ${M.line}; border-radius: 16px; }
    .m-divider { height: 1px; background: ${M.line2}; }
    .m-cap { font-size: 11px; color: ${M.ink3}; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
    .m-label { font-size: 12px; color: ${M.ink3}; }
    .m-chip { display:inline-flex; align-items:center; gap:5px; padding:6px 12px; border-radius:999px; font-size:12px; font-weight:500; border:1px solid ${M.line}; background:${M.card}; color:${M.ink2}; }
    .m-pill { display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:10px; font-weight:600; letter-spacing:0.02em; }
    .m-btn { display:inline-flex; align-items:center; justify-content:center; gap:8px; height:48px; padding:0 22px; border-radius:14px; font-size:15px; font-weight:600; border:none; background:${M.ink}; color:${M.paper}; cursor:pointer; transition: transform 0.1s, opacity 0.15s; font-family: ${M.fontUI}; }
    .m-btn:active { transform: scale(0.98); opacity: 0.9; }
    .m-btn.outline { background:transparent; color:${M.ink}; border:1px solid ${M.line}; }
    .m-btn.ghost { background:transparent; color:${M.ink}; }
    .m-btn.sage { background:${M.sage}; color:#fff; }
    .m-btn.sm { height: 36px; padding: 0 14px; font-size: 13px; border-radius: 10px; }
    .m-input { height:48px; border:1px solid ${M.line}; border-radius:12px; padding:0 16px; font-size:15px; background:${M.card}; color:${M.ink}; display:flex; align-items:center; gap:8px; font-family: ${M.fontUI}; }
    .m-input.empty { color:${M.ink4}; }
    .m-section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: ${M.ink3}; }
    .m-h1 { font-family: ${M.fontDisp}; font-size: 32px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.1; }
    .m-h2 { font-family: ${M.fontDisp}; font-size: 24px; font-weight: 600; letter-spacing: -0.015em; line-height: 1.15; }
    .m-h3 { font-size: 17px; font-weight: 600; letter-spacing: -0.01em; }
    .m-body { font-size: 14px; color: ${M.ink2}; line-height: 1.45; }
    .m-tap { cursor: pointer; transition: opacity 0.15s, transform 0.1s; }
    .m-tap:active { opacity: 0.7; transform: scale(0.98); }
    .m-screen { width:100%; height:100%; background:${M.paper}; color:${M.ink}; font-family:${M.fontUI}; display:flex; flex-direction:column; overflow:hidden; }
    .m-body-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 20px 24px; overscroll-behavior: contain; }
    .m-body-scroll::-webkit-scrollbar { display: none; }
    .m-appbar { display:flex; align-items:center; justify-content:space-between; padding: 8px 16px 12px; gap: 8px; flex-shrink: 0; }
    .m-iconbtn { width:36px; height:36px; border-radius:999px; background:transparent; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; color:${M.ink}; }
    .m-iconbtn.filled { background:${M.card}; border:1px solid ${M.line}; }
    @keyframes mFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .m-fade { animation: mFadeIn 0.28s ease-out both; }
    .m-logo { font-family: ${M.fontDisp}; font-weight: 600; letter-spacing: -0.04em; }
    .m-logo .dot { color: ${M.sage}; }
  `;
  document.head.appendChild(s);
}

function I({ name, size = 20, color = 'currentColor', stroke = 1.6 }) {
  const p = { stroke: color, strokeWidth: stroke, fill: 'none', strokeLinecap: 'round', strokeLinejoin: 'round' };
  const f = { fill: color, stroke: 'none' };
  const w = (kids) => <svg width={size} height={size} viewBox="0 0 24 24" style={{ display: 'block', flexShrink: 0 }}>{kids}</svg>;
  switch (name) {
    case 'home': return w(<path d="M3.5 11.5L12 4l8.5 7.5V20a1 1 0 01-1 1h-4.5v-6h-6v6H4.5a1 1 0 01-1-1z" {...p}/>);
    case 'list': return w(<><path d="M4 7h16M4 12h16M4 17h12" {...p}/></>);
    case 'star': return w(<path d="M12 4l2.4 5.4L20 10l-4 4 1 6-5-3-5 3 1-6-4-4 5.6-.6z" {...p}/>);
    case 'user': return w(<><circle cx="12" cy="9" r="3.5" {...p}/><path d="M5 20c1.2-3.4 4-5 7-5s5.8 1.6 7 5" {...p}/></>);
    case 'plus': return w(<path d="M12 5v14M5 12h14" {...p}/>);
    case 'minus': return w(<path d="M5 12h14" {...p}/>);

  return `${cat.group} → ${cat.name}`;
}

function catNameT(catId, t) {

  const tr = t(key);
  if (tr !== key) return tr;
  return (CATEGORIES[catId] || _catExt[catId] || {}).name || catId;
}
function catPathT(cat, t) {

  const par = cat.parent && (CATEGORIES[cat.parent] || _catExt[cat.parent]);
  if (par) return `${catNameT(par.id, t)} → ${nm}`;
  if (cat.isParent) return nm;
  const gTr = t(_GROUP_KEYS[cat.group] || ('cat.'+cat.group));
  const g = (gTr && gTr !== (_GROUP_KEYS[cat.group] || ('cat.'+cat.group))) ? gTr : cat.group;
  return `${g} → ${nm}`;
}

function fmtSyncTime(isoStr) {
  if (!isoStr) return null;
  const d = new Date(isoStr);
  if (isNaN(d)) return null;
  const now = Date.now();
  const diff = Math.floor((now - d.getTime()) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return `${Math.floor(diff / 60)} min ago`;
  const hm = d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
  const nowD = new Date();
  const dayDiff = Math.floor((nowD.setHours(0,0,0,0) - new Date(d).setHours(0,0,0,0)) / 86400000);
  if (dayDiff === 0) return hm;
  if (dayDiff === 1) return `yesterday ${hm}`;
  const day = d.getDate();
  const mon = d.toLocaleString('en-GB', { month: 'short' }).toLowerCase();
  if (d.getFullYear() === new Date().getFullYear()) return `${day} ${mon}, ${hm}`;
  return `${day} ${mon} ${d.getFullYear()}, ${hm}`;
}

const fmtEur = (n, opts = {}) => {
  const sign = n < 0 ? '−' : (opts.signed && n > 0 ? '+' : '');
  const abs = Math.abs(n);
  const s = abs.toLocaleString('nl-NL', { minimumFractionDigits: opts.decimals ?? 2, maximumFractionDigits: opts.decimals ?? 2 });
  return `${sign}€${s.replace('.', ',').replace(/,(\d{2})$/, ',$1')}`;
};

  if (diff === 1) return 'Yesterday';

  return `${days[d.getDay()]}, ${fmtDate(iso)}`;

function computePeriodHistory(day) {
  const result = [];
  const today = new Date();
  for (let i = 5; i >= 0; i--) {
    const startDate = new Date(today.getFullYear(), today.getMonth() - i, day);
    const endDate = new Date(today.getFullYear(), today.getMonth() - i + 1, day - 1);
    const fmtShort = d => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
    result.push({
      label: `${fmtShort(startDate)} – ${fmtShort(endDate)}`,
      start: startDate.toISOString().slice(0,10),
      end: endDate.toISOString().slice(0,10),
      income: 2480, expense: 1220, invest: 300, unallocated: 620

const NavCtx = React.createContext(null);

function NavProvider({ children, initial = 'home' }) {
  const [tab, setTab] = React.useState(initial);
  const [stacks, setStacks] = React.useState({ home: [], tx: [], recurring: [], events: [], insights: [], profile: [] });
  const stacksRef = React.useRef(stacks);
  const tabRef = React.useRef(tab);
  stacksRef.current = stacks;
  tabRef.current = tab;

  // Sync History API on mount
  React.useEffect(() => {
    window.history.replaceState({ tab: initial, depth: 0 }, '');
    const onPop = (e) => {
      const state = e.state;
      if (!state) return;
      const curStack = stacksRef.current[tabRef.current];
      if (state.depth < curStack.length) {
        setStacks(s => ({ ...s, [tabRef.current]: s[tabRef.current].slice(0, state.depth) }));
      } else if (state.tab !== tabRef.current) {
        setTab(state.tab);
        setStacks(s => ({ ...s, [state.tab]: s[state.tab].slice(0, state.depth) }));
      }
    };
    window.addEventListener('popstate', onPop);
    return () => window.removeEventListener('popstate', onPop);
  }, []);

  const push = (screen, params = {}) => {
    setStacks(s => {
      const next = [...s[tabRef.current], { screen, params }];
      window.history.pushState({ tab: tabRef.current, depth: next.length }, '');
      return { ...s, [tabRef.current]: next };
    });
  };
  const pop = () => {
    setStacks(s => {
      const next = s[tabRef.current].slice(0, -1);
      window.history.pushState({ tab: tabRef.current, depth: next.length }, '');
      return { ...s, [tabRef.current]: next };
    });
  };
  const popAll = () => {
    setStacks(s => {
      window.history.pushState({ tab: tabRef.current, depth: 0 }, '');
      return { ...s, [tabRef.current]: [] };
    });
  };
  const switchTab = (t) => {
    window.history.pushState({ tab: t, depth: stacksRef.current[t].length }, '');
    setTab(t);
  };
  const replace = (screen, params = {}) => {
    setStacks(s => {
      const next = [...s[tabRef.current].slice(0, -1), { screen, params }];
      window.history.replaceState({ tab: tabRef.current, depth: next.length }, '');
      return { ...s, [tabRef.current]: next };
    });
  };

  const value = { tab, stack: stacks[tab], push, pop, popAll, switchTab, replace };
  return <NavCtx.Provider value={value}>{children}</NavCtx.Provider>;
}

  <script type="text/babel">
// ── charts.jsx ─────────────────────────────────────────────────

function Sparkline({ data, width = 60, height = 20, color = M.ink, fill, strokeWidth = 1.5 }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const stepX = width / (data.length - 1);
  const pts = data.map((v, i) => [i * stepX, height - ((v - min) / range) * height]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = fill ? `${d} L${width},${height} L0,${height} Z` : null;
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      {fill && <path d={fillD} fill={fill} stroke="none"/>}
      <path d={d} fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
}

function BarChart({ data, labels, width = 280, height = 96, highlightLast = true, color = M.ink, accent = M.sage, showValues = false, selected = -1, onSelect }) {
  const max = Math.max(...data, 1);
  const padding = 6;
  const valueH = showValues ? 14 : 0;
  const labelH = labels ? 14 : 0;
  const barAreaH = height - valueH - labelH;
  const barW = (width - padding * (data.length - 1)) / data.length;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      {data.map((v, i) => {
        const h = Math.max(2, (v / max) * (barAreaH - 4));
        const x = i * (barW + padding);
        const y = valueH + barAreaH - h;
        const isLast = i === data.length - 1;
        const isSel = selected === i;
        const barColor = (selected >= 0 ? isSel : (highlightLast && isLast)) ? accent : color;
        const opacity = selected >= 0 ? (isSel ? 1 : 0.22) : (highlightLast && !isLast ? 0.22 : 0.92);
        return (
          <g key={i} style={{ cursor: onSelect ? 'pointer' : 'default' }} onClick={() => onSelect && onSelect(i)}>
            <rect x={x - 3} y={valueH} width={barW + 6} height={barAreaH} rx={0} fill="transparent"/>
            <rect x={x} y={y} width={barW} height={h} rx={3} fill={barColor} opacity={opacity}
              style={{ transformOrigin: `${x + barW/2}px ${valueH + barAreaH}px`, animation: `barRise 0.4s cubic-bezier(0.34,1.56,0.64,1) ${i * 0.04}s both` }}/>
            {showValues && v > 0 && (
              <text x={x + barW / 2} y={valueH - 2} fontSize="8" fill={isSel || (selected < 0 && isLast) ? accent : color} textAnchor="middle" fontFamily="-apple-system,system-ui" fontWeight="600" opacity={opacity < 0.5 ? 0.5 : 1}>
                {v >= 1000 ? `€${(v/1000).toFixed(1)}k` : `€${Math.round(v)}`}
              </text>
            )}
            {labels && <text x={x + barW / 2} y={height - 2} fontSize="8" fill={M.ink4} textAnchor="middle" fontFamily="-apple-system,system-ui" fontWeight="500">{labels[i]}</text>}
          </g>
        );
      })}
    </svg>
  );
}

function BarChartScrollable({ data, labels, height = 100, accent = M.sage, color = M.ink2, onSelect, selected: extSel }) {
  const [internalSel, setInternalSel] = React.useState(data.length - 1);
  const sel = extSel !== undefined ? extSel : internalSel;
  const handleSelect = (i) => { setInternalSel(i); onSelect && onSelect(i); };
  const barW = 28, gap = 8, totalW = Math.max(300, data.length * (barW + gap));
  const containerRef = React.useRef(null);
  React.useEffect(() => {
    if (containerRef.current) containerRef.current.scrollLeft = containerRef.current.scrollWidth;
  }, []);
  return (
    <div ref={containerRef} style={{ overflowX:'auto', WebkitOverflowScrolling:'touch', marginLeft:-4, paddingLeft:4 }}>
      <div style={{ width: totalW, minWidth: '100%' }}>
        <BarChart data={data} labels={labels} width={totalW} height={height} highlightLast={false}
          accent={accent} color={color} showValues selected={sel} onSelect={handleSelect}/>
      </div>
    </div>
  );
}

function Donut({ data, size = 130, thickness = 18, center }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const r = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  let acc = 0;
  return (
    <div style={{ position: 'relative', width: size, height: size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={r} fill="none" stroke={M.line2} strokeWidth={thickness}/>
        {data.map((d, i) => {
          const dash = (d.value / total) * (2 * Math.PI * r);
          const offset = (acc / total) * (2 * Math.PI * r);
          acc += d.value;
          return (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none"
              stroke={d.color} strokeWidth={thickness}
              strokeDasharray={`${dash} ${2 * Math.PI * r}`}
              strokeDashoffset={-offset}
              strokeLinecap="butt"/>
          );
        })}
      </svg>
      {center && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', flexDirection: 'column' }}>
          {center}
        </div>
      )}
    </div>
  );
}

function StackedBar({ segments, height = 8, radius = 999 }) {
  const total = segments.reduce((s, x) => s + x.value, 0) || 1;
  return (
    <div style={{
      display: 'flex', height, borderRadius: radius,
      overflow: 'hidden', background: M.line2,
    }}>
      {segments.map((s, i) => (
        <div key={i} style={{
          width: `${(s.value / total) * 100}%`,
          background: s.color,
          borderRight: i < segments.length - 1 ? `1.5px solid ${M.paper}` : 'none',
          transition: 'width 0.35s ease',
        }}/>
      ))}
    </div>
  );
}

function LineChart({ data, width = 320, height = 120, color = M.sage, fill = 'rgba(74,106,79,0.10)', dots = false }) {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = (max - min) || 1;
  const padding = 4;
  const stepX = (width - padding * 2) / (data.length - 1);
  const pts = data.map((v, i) => [padding + i * stepX, padding + (height - padding * 2) * (1 - (v - min) / range)]);
  const d = pts.map((p, i) => `${i ? 'L' : 'M'}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(' ');
  const fillD = `${d} L${pts[pts.length - 1][0]},${height} L${pts[0][0]},${height} Z`;
  return (
    <svg width="100%" height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      <path d={fillD} fill={fill} stroke="none"/>
      <path d={d} fill="none" stroke={color} strokeWidth={1.8} strokeLinecap="round" strokeLinejoin="round"/>
      {dots && pts.map((p, i) => (
        <circle key={i} cx={p[0]} cy={p[1]} r={i === pts.length - 1 ? 3 : 0} fill={color}/>
      ))}
    </svg>
  );
}

function CustomGraphCard({ card, txs }) {
  const nav = useNav();
  const [periodDay] = useLocalStorage('munni_period_day', 20);
  const periodHistory = computePeriodHistory(periodDay);
  const currentPeriod = periodHistory[periodHistory.length - 1];
  const excluded = card.excludeCategories || [];

  const filteredTxs = txs.filter(t => {
    if (t.amount >= 0 || t.savingAccount) return false;
    if (t.date < currentPeriod.start || t.date > currentPeriod.end) return false;
    const cat = CATEGORIES[t.cat] || _catExt[t.cat] || {};
    const parentId = cat.parent || cat.id;
    if (excluded.includes(parentId) || excluded.includes(t.cat)) return false;
    return true;
  });

  const total = filteredTxs.reduce((s,t) => s + Math.abs(t.amount), 0);

  // Group by parent category
  const byCat = {};
  filteredTxs.forEach(t => {
    const cat = CATEGORIES[t.cat] || _catExt[t.cat] || {};
    const parentId = cat.parent || cat.id;
    const parentCat = CATEGORIES[parentId] || _catExt[parentId] || cat;
    if (!byCat[parentId]) byCat[parentId] = { name: parentCat.name, color: parentCat.color || M.slate, total: 0 };
    byCat[parentId].total += Math.abs(t.amount);
  });
  const segments = Object.values(byCat).sort((a,b) => b.total - a.total);

  return (
    <div className="m-card m-fade" style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
        <div className="m-h3">{card.name}</div>
        <div style={{ fontSize:11, color:M.ink3, fontWeight:500 }}>This period</div>
      </div>
      <div className="m-num" style={{ fontSize:24, fontWeight:600, marginBottom:10 }}>{fmtEur(total)}</div>
      {segments.length > 0 && (
        <>
          <StackedBar height={8} segments={segments.map(s => ({ value:s.total, color:s.color }))}/>
          <div style={{ display:'flex', flexWrap:'wrap', gap:6, marginTop:8 }}>
            {segments.slice(0,4).map(s => (
              <div key={s.name} style={{ display:'flex', alignItems:'center', gap:4, fontSize:10, color:M.ink3 }}>
                <div style={{ width:6, height:6, borderRadius:2, background:s.color }}/>
                {s.name}
              </div>
            ))}
          </div>
        </>
      )}
      {segments.length === 0 && <div style={{ fontSize:13, color:M.ink4 }}>No transactions this period</div>}
    </div>
  );
}

function ScreenHome() {
  const nav = useNav();
  const { t } = useLang();
  const alloc = useAlloc();
  const { txs } = useTxCtx();
  const { profiles, setProfiles } = useProfiles();
  const { recurList } = useRecurCtx();
  const [homeCards] = useLocalStorage('munni_home_cards', HOME_CARDS_DEFAULT);
  const [upcomingDays] = useLocalStorage('munni_upcoming_days', 3);
  const [customGraphCards] = useLocalStorage('munni_custom_graphs', []);
  const [showProfileSwitcher, setShowProfileSwitcher] = React.useState(false);

  const [budgets] = useProfileBudgets();
  const [goals] = useProfileGoals();
  const [debts] = useProfileDebts();

  const reviewCount = txs.filter(t => t.needsReview).length;
  const budgetTop = [...budgets].sort((a, b) => (b.spent/b.total) - (a.spent/a.total)).slice(0, 3);
  const [pidx, setPidx] = React.useState(PERIOD_HISTORY.length - 1);
  const pd = PERIOD_HISTORY[pidx];
  const isCurrent = pidx === PERIOD_HISTORY.length - 1;
  const currentUnallocated = alloc ? alloc.unallocated : pd.unallocated;

  const activeProfile = profiles.find(p => p.active) || profiles[0];
  const [connectedAccounts] = useLocalStorage('munni_bank_accounts', () => ACCOUNTS.slice());
  const [lastSyncedStr] = useLocalStorage('munni_last_synced', null);
  const activeAccountIds = activeProfile?.accountIds || [];
  const totalBalance = connectedAccounts
    .filter(a => a.type === 'checking' && activeAccountIds.includes(a.id))
    .reduce((s, a) => s + (a.balance || 0), 0);

  // Compute period values from txs
  const periodTxs = React.useMemo(() => {
    if (!txs) return [];
    const { start, end } = pd;
    if (!start || !end) return txs;
    return txs.filter(t => t.date >= start && t.date <= end);
  }, [txs, pd]);
  const periodIncome  = React.useMemo(() => periodTxs.filter(t => t.amount > 0).reduce((s,t) => s + t.amount, 0), [periodTxs]);
  const periodExpense = React.useMemo(() => periodTxs.filter(t => t.amount < 0 && !t.savingAccount).reduce((s,t) => s + Math.abs(t.amount), 0), [periodTxs]);
  const periodInvest  = React.useMemo(() => periodTxs.filter(t => t.cat === 'invest').reduce((s,t) => s + Math.abs(t.amount), 0), [periodTxs]);
  const periodSavings = React.useMemo(() => periodTxs.filter(t => t.savingAccount).reduce((s,t) => s + Math.abs(t.amount), 0), [periodTxs]);

  const activateProfile = (id) => {
    setProfiles(ps => ps.map(p => ({ ...p, active: p.id === id })));
    setShowProfileSwitcher(false);
  };

  const isVisible = (id) => {
    const card = homeCards.find(c => c.id === id);
    return card ? card.visible : true;
  };

  // Order home cards as per homeCards config (pinned first, then in user order)
  const orderedCardIds = homeCards.map(c => c.id);

  const renderCard = (id) => {
    switch(id) {
      case 'review':
        if (reviewCount === 0) return null;
        return (
          <div key="review" className="m-tap m-card m-fade" onClick={() => nav.push('reviewSwipe')} style={{
            padding:14, marginBottom:14, border:`1px solid ${M.ochreSoft}`, background:'#FBF6E9',
            display:'flex', alignItems:'center', gap:12,
          }}>
            <div style={{ width:40, height:40, borderRadius:10, background:M.ochreSoft, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
              <I name="sliders" size={18} color={M.ochre}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600 }}>Review {reviewCount} transactions</div>
              <div style={{ fontSize:11, color:M.ink3, marginTop:1 }}>{t('review.title')}</div>
            </div>
            <I name="arrowR" size={16} color={M.ink3}/>
          </div>
        );
      case 'period':
        if (!isVisible('period')) return null;
        return (
          <div key="period" className="m-card m-fade" style={{ padding:'16px 16px 14px', marginBottom:14, border:`1px solid ${M.line}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
              <div className="m-cap">{t('home.period')}</div>
              <div style={{ display:'flex', alignItems:'center', gap:4 }}>
                <button className="m-iconbtn m-tap" onClick={() => setPidx(i => Math.max(0, i-1))}
                  style={{ width:28, height:28, opacity:pidx===0?0.3:1 }}><I name="arrowL" size={14}/></button>
                <div style={{ fontSize:12, fontWeight:600, color:M.ink2, width:130, textAlign:'center' }}>{pd.label}</div>
                <button className="m-iconbtn m-tap" onClick={() => setPidx(i => Math.min(PERIOD_HISTORY.length-1, i+1))}
                  style={{ width:28, height:28, opacity:isCurrent?0.3:1 }}><I name="arrowR" size={14}/></button>
              </div>
            </div>
            <PeriodStatRow icon="arrow-dn-right" iconBg={M.sageSoft} iconColor={M.sage}
              label={t('home.income')} value={periodIncome} valueColor={M.sage}
              onClick={() => nav.push('income')}/>
            <div style={{ height:1, background:M.line2 }}/>
            <PeriodStatRow icon="arrow-up-right" iconBg={M.claySoft} iconColor={M.clay}
              label={t('home.spent')} value={periodExpense} valueColor={M.clay}
              onClick={() => nav.push('expenses')}/>
            <div style={{ height:1, background:M.line2 }}/>
            <PeriodStatRow icon="rocket" iconBg={M.violetSoft} iconColor={M.violet}
              label={t('home.invested')} value={periodInvest} valueColor={M.violet}
              onClick={() => nav.push('invested')}/>
            <div style={{ height:1, background:M.line2 }}/>
            <PeriodStatRow icon="piggy" iconBg={M.ochreSoft} iconColor={M.ochre}
              label={t('home.savings')} value={periodSavings} valueColor={M.ochre}
              onClick={() => nav.push('savings')}/>
            <div style={{ height:1, background:M.line2 }}/>
            <PeriodStatRow icon="goal"
              iconBg={isCurrent?(currentUnallocated===0?M.sageSoft:M.ochreSoft):(pd.unallocated===0?M.sageSoft:M.ochreSoft)}
              iconColor={isCurrent?(currentUnallocated===0?M.sage:M.ochre):(pd.unallocated===0?M.sage:M.ochre)}
              label={t('home.allocate')} value={isCurrent?currentUnallocated:pd.unallocated}
              valueColor={isCurrent?(currentUnallocated===0?M.sage:M.ochre):(pd.unallocated===0?M.sage:M.ochre)}
              sub={isCurrent?(currentUnallocated===0?t('home.everyEuroPlanned'):t('home.unallocated')):(pd.unallocated===0?t('home.everyEuroPlanned'):t('home.unallocated'))}
              badge={isCurrent?currentUnallocated>0:pd.unallocated>0}
              onClick={() => nav.push('allocate')}/>
          </div>
        );
      case 'budgets':
        if (!isVisible('budgets')) return null;
        return (
          <div key="budgets" className="m-card m-fade" style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                <div className="m-h3">{t('budgets.title')}</div>
                <div style={{ display:'flex', alignItems:'center', gap:3 }}>
                  {budgets.map(b => (
                    <div key={b.id} style={{ width:7, height:7, borderRadius:999, background: b.spent > b.total ? M.clay : M.sage }}/>
                  ))}
                </div>
              </div>
              <div className="m-tap" onClick={() => nav.push('budgets')} style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:M.ink3, fontWeight:500 }}>
                {t('action.seeAll')} {budgets.length} <I name="caretR" size={12}/>
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
              {budgetTop.map(b => <BudgetMini key={b.id} b={b} onClick={() => nav.push('budgetDetail', { id:b.id })}/>)}
            </div>
          </div>
        );
      case 'goals':
        if (!isVisible('goals')) return null;
        return (
          <div key="goals" className="m-card m-fade" style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
              <div className="m-h3">{t('goals.title')}</div>
              <div className="m-tap" onClick={() => nav.push('goals')} style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:M.ink3, fontWeight:500 }}>
                {t('action.seeAll')} <I name="caretR" size={12}/>
              </div>
            </div>
            {(() => {
              const totalTarget = goals.reduce((s,g) => s + g.target, 0);
              const totalCurrent = goals.reduce((s,g) => s + g.current, 0);
              const pct = totalTarget > 0 ? Math.round(totalCurrent/totalTarget*100) : 0;
              return (
                <div style={{ display:'flex', alignItems:'center', gap:10, marginBottom:12, paddingBottom:12, borderBottom:`1px solid ${M.line2}` }}>
                  <svg width="44" height="44" viewBox="0 0 44 44">
                    <circle cx="22" cy="22" r="18" fill="none" stroke={M.line2} strokeWidth="4"/>
                    <circle cx="22" cy="22" r="18" fill="none" stroke={M.violet} strokeWidth="4"
                      strokeDasharray={`${pct * 1.131} 113.1`}
                      strokeLinecap="round"
                      transform="rotate(-90 22 22)"
                      style={{ transition:'stroke-dasharray 0.5s ease' }}/>
                    <text x="22" y="26" textAnchor="middle" fontSize="10" fontWeight="700" fill={M.ink} fontFamily="'SF Pro Display',system-ui">{pct}%</text>
                  </svg>
                  <div>
                    <div style={{ fontSize:13, fontWeight:600 }}>{fmtEur(totalCurrent)} {t('goals.saved')}</div>
                    <div style={{ fontSize:11, color:M.ink3, marginTop:1 }}>{t('budgets.of')} {fmtEur(totalTarget)} {t('goals.totalSaved').toLowerCase()}</div>
                  </div>
                </div>
              );
            })()}
            <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
              {goals.map(g => <GoalMiniRow key={g.id} g={g} onClick={() => nav.push('goalDetail', { id:g.id })}/>)}
            </div>
          </div>
        );
      case 'debts':
        if (!isVisible('debts')) return null;
        return (() => {
          const totalDebt = debts.reduce((s, d) => s + d.balance, 0);
          const paidOff = debts.reduce((s, d) => s + (d.original - d.balance), 0);
          const total = debts.reduce((s, d) => s + d.original, 0);
          return (
            <div key="debts" className="m-tap m-card m-fade" onClick={() => nav.push('debts')} style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10 }}>
                <div className="m-h3">{t('debts.title')}</div>
                <div className="m-tap" style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:M.ink3, fontWeight:500 }}>
                  {debts.length} {t('debts.activeDebts').toLowerCase()} <I name="caretR" size={12}/>
                </div>
              </div>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'baseline', marginBottom:10 }}>
                <div className="m-num" style={{ fontSize:22, fontWeight:600, color:M.clay }}>{fmtEurInt(totalDebt)}</div>
                <div style={{ fontSize:11, color:M.sage, fontWeight:600 }}>{Math.round(paidOff/total*100)}% paid off overall</div>
              </div>
              <div style={{ height:6, borderRadius:999, background:M.line2, overflow:'hidden' }}>
                <div style={{ width:`${Math.round(paidOff/total*100)}%`, height:'100%', background:M.sage }}/>
              </div>
              <div style={{ marginTop:6, fontSize:11, color:M.ink3 }}>
                {debts.length} active debt{debts.length!==1?'s':''} · started at {fmtEur(total)}
              </div>
            </div>
          );
        })();
      case 'upcoming':
        if (!isVisible('upcoming')) return null;
        return (() => {
          const today = new Date();
          today.setHours(0,0,0,0);
          const cutoff = new Date(today);
          cutoff.setDate(cutoff.getDate() + upcomingDays);
          const todayYear = today.getFullYear();
          const todayMonth = today.getMonth();
          // Build upcoming items from recurList using their day field
          const upcomingItems = (recurList || []).filter(r => r.active !== false && r.amount < 0).map(r => {
            // Compute next occurrence date using r.day (day of month)
            const d = r.day;
            let candidate = new Date(todayYear, todayMonth, d);
            if (candidate < today) candidate = new Date(todayYear, todayMonth + 1, d);
            candidate.setHours(0,0,0,0);
            return { ...r, _nextDate: candidate };
          }).filter(r => r._nextDate >= today && r._nextDate <= cutoff)
            .sort((a, b) => a._nextDate - b._nextDate);
          const fmtDate = (d) => d.toLocaleDateString('en-GB', { day:'numeric', month:'short' });
          return (
            <div key="upcoming" className="m-card m-fade" style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12 }}>
                <div className="m-h3">{t('upcoming.title')}</div>
                <div className="m-tap" onClick={() => nav.switchTab('recurring')} style={{ display:'flex', alignItems:'center', gap:4, fontSize:12, color:M.ink3, fontWeight:500 }}>
                  {t('action.seeAll')} <I name="caretR" size={12}/>
                </div>
              </div>
              {upcomingItems.length === 0 ? (
                <div style={{ fontSize:13, color:M.ink3, padding:'8px 0' }}>No upcoming payments in the next {upcomingDays} days.</div>
              ) : (
                <div style={{ display:'flex', flexDirection:'column', gap:2 }}>
                  {upcomingItems.map((r, i) => (
                    <React.Fragment key={r.id}>
                      {i > 0 && <Divider inset={36}/>}
                      <div className="m-tap" onClick={() => nav.push('recurringDetail', { id: r.id })} style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 0', cursor:'pointer' }}>
                        <div style={{ width:28, height:28, borderRadius:8, background:M.paper2, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
                          <I name={r.icon} size={14} color={M.ink2}/>
                        </div>
                        <div style={{ flex:1, minWidth:0 }}>
                          <div style={{ fontSize:13, fontWeight:500, whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{r.name}</div>
                          {(() => {
                            const daysAway = Math.ceil((r._nextDate - today) / 86400000);
                            const chipColor = daysAway === 0 ? M.clay : daysAway <= 2 ? M.ochre : M.sage;
                            const chipBg = daysAway === 0 ? M.claySoft : daysAway <= 2 ? M.ochreSoft : M.sageSoft;
                            const chipLabel = daysAway === 0 ? 'today' : daysAway === 1 ? 'tomorrow' : `in ${daysAway} days`;
                            return (
                              <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:1 }}>
                                <span style={{ fontSize:9, fontWeight:700, padding:'1px 6px', borderRadius:999, background:chipBg, color:chipColor, textTransform:'uppercase', letterSpacing:'0.04em' }}>{chipLabel}</span>
                              </div>
                            );
                          })()}
                        </div>
                        <div className="m-num" style={{ fontSize:13, fontWeight:600, color:M.clay }}>{fmtEur(r.amount)}</div>
                      </div>
                    </React.Fragment>
                  ))}
                </div>
              )}
            </div>
          );
        })();
      case 'investment':
        if (!isVisible('investment')) return null;
        return (
          <div key="investment" className="m-tap m-card m-fade" onClick={() => nav.push('investment')} style={{
            padding:16, marginBottom:14, border:`1px solid ${M.line}`, display:'flex', alignItems:'center', gap:14,
          }}>
            <div style={{ width:40, height:40, borderRadius:10, background:M.violetSoft, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <I name="rocket" size={18} color={M.violet}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600 }}>Investments</div>
              <div className="m-num" style={{ fontSize:15, fontWeight:600, marginTop:2 }}>
                {fmtEurInt(PORTFOLIO.total)}
                <span style={{ fontSize:13, color:M.sage, marginLeft:8, fontFamily:M.fontUI, fontWeight:700, background:M.sageSoft, padding:'1px 7px', borderRadius:999 }}>+{PORTFOLIO.pnlPct.toFixed(1)}%</span>
              </div>
            </div>
            <Sparkline data={PORTFOLIO.curve} width={60} height={26} color={M.violet} fill="rgba(94,74,120,0.12)" strokeWidth={1.6}/>
            <I name="caretR" size={14} color={M.ink4}/>
          </div>
        );
      case 'insights':
        if (!isVisible('insights')) return null;
        return (
          <div key="insights" className="m-tap m-card m-fade" onClick={() => nav.switchTab('insights')} style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}`, display:'flex', alignItems:'center', gap:14 }}>
            <div style={{ width:40, height:40, borderRadius:10, background:M.sageSoft, display:'flex', alignItems:'center', justifyContent:'center' }}>
              <I name="trending-up" size={18} color={M.sage}/>
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:14, fontWeight:600 }}>Insights</div>
              <div style={{ fontSize:12, color:M.ink3, marginTop:2 }}>AI spending analysis</div>
            </div>
            <I name="caretR" size={14} color={M.ink4}/>
          </div>
        );
      case 'quickActions':
        if (!isVisible('quickActions')) return null;
        return (
          <div key="quickActions" className="m-card m-fade" style={{ padding:16, marginBottom:14, border:`1px solid ${M.line}` }}>
            <div className="m-h3" style={{ marginBottom:12 }}>Quick Actions</div>
            <div style={{ display:'flex', gap:10 }}>
              {[
                { label:'Add saving', icon:'piggy', action: () => nav.push('savingAccounts') },
                { label:'Review tx', icon:'sliders', action: () => nav.push('reviewSwipe') },
                { label:'New budget', icon:'goal', action: () => nav.push('budgetCreate') },
              ].map(a => (
                <button key={a.label} className="m-tap" onClick={a.action} style={{ flex:1, padding:'12px 8px', background:M.paper2, border:`1px solid ${M.line}`, borderRadius:12, textAlign:'center', cursor:'pointer', fontFamily:M.fontUI }}>
                  <I name={a.icon} size={20} color={M.ink2}/>
                  <div style={{ fontSize:11, color:M.ink3, marginTop:6 }}>{a.label}</div>
                </button>
              ))}
            </div>
          </div>
        );
      case 'customGraph':
        // Custom graph cards are rendered separately below — skip here
        return null;
      default: return null;
    }
  };

  return (
    <div className="m-screen">
      <StatusBar/>

      {/* Header */}
      <div style={{ padding:'16px 20px 14px', display:'flex', alignItems:'center', gap:12, flexShrink:0 }}>
        <div className="m-tap" onClick={() => setShowProfileSwitcher(true)} style={{ flexShrink:0 }}>
          <div style={{ position:'relative' }}>
            <ProfileAvatar profile={activeProfile} size={42}/>
            {activeProfile?.isDemo && (
              <div style={{ position:'absolute', bottom:-4, right:-2, fontSize:8, fontWeight:700, padding:'1px 5px', borderRadius:999, background:M.ochre, color:'#fff', textTransform:'uppercase', letterSpacing:'0.04em' }}>Demo</div>
            )}
          </div>
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div className="m-num" style={{ fontSize:22, fontWeight:600, letterSpacing:'-0.02em', lineHeight:1 }}>
            {fmtEur(totalBalance)}
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:5, marginTop:3 }}>
            <div style={{ width:5, height:5, borderRadius:999, background:M.sage, flexShrink:0 }}/>
            <div style={{ fontSize:11, color:M.ink3 }}>{lastSyncedStr ? `Last sync · ${fmtSyncTime(lastSyncedStr)}` : 'Not synced yet'}</div>
          </div>
        </div>
        <button className="m-iconbtn filled m-tap" onClick={() => nav.push('notifications')}><I name="bell" size={18}/></button>
      </div>

      <div className="m-body-scroll">
        {orderedCardIds.map(id => renderCard(id))}
        {customGraphCards.map(cg => (
          <CustomGraphCard key={cg.id} card={cg} txs={txs}/>
        ))}
        <div style={{ height:12 }}/>
      </div>

      <TabBar active="home" onChange={(t) => nav.switchTab(t)}/>

      {/* Profile switcher sheet */}
      {showProfileSwitcher && (
        <Sheet onClose={() => setShowProfileSwitcher(false)}>
          <div style={{ padding:'4px 16px 8px' }}>
            <div style={{ fontSize:17, fontWeight:700, marginBottom:16 }}>{t('home.switchProfile')}</div>
            <div className="m-card" style={{ border:`1px solid ${M.line}`, padding:'4px 16px', marginBottom:16 }}>
              {profiles.map((p, i) => {
                const acctCount = (p.accountIds || []).length;
                return (
                  <React.Fragment key={p.id}>
                    {i > 0 && <Divider inset={48}/>}
                    <div className="m-tap" onClick={() => activateProfile(p.id)}
                      style={{ display:'flex', alignItems:'center', gap:12, padding:'13px 0' }}>
                      <ProfileAvatar profile={p} size={36}/>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:14, fontWeight:600 }}>{p.name}</div>
                        <div style={{ fontSize:11, color:M.ink3, marginTop:1 }}>{acctCount} account{acctCount !== 1 ? 's' : ''}</div>
                      </div>
                      {p.active ? (
                        <div style={{ width:20, height:20, borderRadius:999, background:M.sage, display:'flex', alignItems:'center', justifyContent:'center' }}>
                          <I name="check" size={11} color="#fff" stroke={2.5}/>
                        </div>
                      ) : (
                        <div style={{ width:20, height:20, borderRadius:999, border:`2px solid ${M.line2}` }}/>
                      )}
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
            <div className="m-tap" onClick={() => { setShowProfileSwitcher(false); nav.push('profiles'); }}
              style={{ display:'flex', alignItems:'center', justifyContent:'center', gap:6, padding:'12px 0', color:M.sage, fontSize:14, fontWeight:600 }}>
              {t('home.manageProfiles')} <I name="caretR" size={14} color={M.sage}/>
            </div>
          </div>
        </Sheet>
      )}
    </div>
  );
}

function PeriodLegendRow({ color, label, value, dim }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <div style={{ width: 8, height: 8, borderRadius: 2, background: color }}/>
      <div style={{ fontSize: 12, color: dim ? M.ink4 : M.ink2, flex: 1 }}>{label}</div>
      <div className="m-num" style={{ fontSize: 13, fontWeight: 600, color: dim ? M.ink3 : M.ink }}>{fmtEurInt(value)}</div>
    </div>
  );
}

function PeriodStatRow({ icon, iconBg, iconColor, label, value, valueColor, sub, onClick, badge }) {
  return (
    <div className="m-tap" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0' }}>

function budgetDaysLeft(b) {
  const TODAY = new Date('2026-02-18');
  const periodStart = new Date('2026-01-20');
  const elapsed = Math.floor((TODAY - periodStart) / 86400000) % b.periodDays;
  return b.periodDays - elapsed;
}

function BudgetMini({ b, onClick }) {
  const ratio = b.spent / b.total;
  const over = ratio > 1;
  const color = budgetColor(ratio);
  const left = b.total - b.spent;
  return (
    <div className="m-tap" onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
      <div style={{ width: 32, height: 32, borderRadius: 9, background: budgetSoft(ratio), display: 'flex', alignItems: 'center', justifyContent: 'center' }}>

          <div className="m-num" style={{ fontSize: 12, fontWeight: 600, color: over ? M.clay : M.ink2 }}>
            {over ? `−${fmtEurInt(Math.abs(left))}` : `${fmtEurInt(left)} left`}
          </div>
        </div>
        <div style={{ height: 5, marginTop: 6, borderRadius: 999, background: M.line2, overflow: 'hidden', display: 'flex' }}>
          <div style={{ width: `${Math.min(100, ratio * 100)}%`, height: '100%', background: color }}/>
          {over && <div style={{ flex: 1, background: `repeating-linear-gradient(45deg, ${M.clay} 0 3px, ${M.claySoft} 3px 6px)` }}/>}
        </div>
        <div style={{ fontSize:10, color:M.ink4, marginTop:4 }}>{budgetDaysLeft(b)}d left</div>
      </div>
    </div>
  );
}

  <script type="text/babel">
// ── screens-tx.jsx ─────────────────────────────────────────────

function HighlightText({ text, query }) {
  if (!query) return <span>{text}</span>;
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx === -1) return <span>{text}</span>;
  return (
    <span>
      {text.slice(0, idx)}
      <mark style={{ background: M.ochreSoft, color: M.ochre, borderRadius: 3, padding: '0 2px' }}>{text.slice(idx, idx + query.length)}</mark>
      {text.slice(idx + query.length)}
    </span>
  );
}

function ScreenTransactions() {
  const nav = useNav();
  const { t } = useLang();
  const { txs } = useTxCtx();
  const [filter, setFilter] = React.useState('all');
  const [query, setQuery] = React.useState('');
  const [searchOpen, setSearchOpen] = React.useState(false);
  const searchRef = React.useRef(null);

  React.useEffect(() => { if (searchOpen && searchRef.current) searchRef.current.focus(); }, [searchOpen]);

  let filtered = txs;
  if (filter === 'income') filtered = filtered.filter(t => t.amount > 0);
  if (filter === 'expense') filtered = filtered.filter(t => t.amount < 0);
  if (filter === 'review') filtered = filtered.filter(t => t.needsReview);
  if (filter === 'recurring') filtered = filtered.filter(t => t.recurring);
  if (query) filtered = filtered.filter(t =>
    t.merchant.toLowerCase().includes(query.toLowerCase()) ||
    t.desc.toLowerCase().includes(query.toLowerCase())
  );

  const groups = {};
  filtered.forEach(t => {
    const k = t.date;
    if (!groups[k]) groups[k] = [];
    groups[k].push(t);
  });
  const days = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  const filters = [
    { id: 'all', label: 'All' },
    { id: 'income', label: 'Income' },
    { id: 'expense', label: 'Expense' },
    { id: 'review', label: 'Review' },
    { id: 'recurring', label: 'Recurring' },
  ];

  return (
    <div className="m-screen">
      <StatusBar/>
      {searchOpen ? (
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'12px 16px', flexShrink:0, borderBottom:`1px solid ${M.line2}` }}>
          <I name="search" size={16} color={M.ink3}/>
          <input
            ref={searchRef}
            value={query}
            onChange={e => setQuery(e.target.value)}
            placeholder="Search transactions…"
            style={{ flex:1, border:'none', outline:'none', fontSize:15, fontFamily:M.fontUI, background:'transparent', color:M.ink }}
          />
          <button className="m-tap" onClick={() => { setSearchOpen(false); setQuery(''); }}
            style={{ background:'transparent', border:'none', fontSize:13, fontWeight:600, color:M.ink3, cursor:'pointer', fontFamily:M.fontUI }}>
            {t('action.cancel')}
          </button>
        </div>
      ) : (
        <AppBar title={t('tab.transactions')} large
          leading={null}
          trailing={
            <button className="m-iconbtn m-tap" onClick={() => setSearchOpen(true)}>
              <I name="search" size={20}/>
            </button>
          }
        />
      )}

      {!searchOpen && (
        <div style={{ padding: '0 20px 12px', display: 'flex', gap: 6, overflowX: 'auto', flexShrink: 0 }}>
          {filters.map(f => (
            <button key={f.id} onClick={() => setFilter(f.id)}
              className="m-chip m-tap"
              style={{
                background: filter === f.id ? M.ink : M.card,
                color: filter === f.id ? M.paper : M.ink2,
                borderColor: filter === f.id ? M.ink : M.line,
                fontWeight: filter === f.id ? 600 : 500,
                flexShrink: 0,
              }}>{f.label}</button>
          ))}
        </div>
      )}

      <div className="m-body-scroll">
        {days.map(d => (
          <div key={d} style={{ marginBottom: 18 }}>
            <div style={{ marginBottom: 8, padding: '0 4px' }}>
              <div className="m-cap">{dayLabel(d)}</div>
            </div>
            <div className="m-card" style={{ padding: '0 16px', border: `1px solid ${M.line}` }}>
              {groups[d].map((t, i, a) => (

          </div>
        )}
      </div>

      <TabBar active="tx" onChange={(t) => nav.switchTab(t)}/>
    </div>
  );
}

  const [connectedAccounts] = useLocalStorage('munni_bank_accounts', () => ACCOUNTS.slice());

  const tx = txs.find(t => t.id === params.id) || txs[0] || TRANSACTIONS[0];

  const initCats = () => tx.cats ? tx.cats.slice() : [{ catId: tx.cat, amount: Math.abs(tx.amount) }];
  const [txCats, setTxCats] = React.useState(initCats);
  const [noteText, setNoteText] = React.useState(tx.note || '');
  // Derive from live tx so store/photo receipt additions are reflected immediately
  const hasReceiptState = tx.hasReceipt || false;

  const NOTE_MAX = 200;

  const originalTx = tx.linkedTo ? txs.find(t => t.id === tx.linkedTo) : null;
  const reimburseAmt = linkedTx ? linkedTx.amount : 0;
  const net = tx.amount + reimburseAmt;
  const netOriginalTx = originalTx ? originalTx.amount + tx.amount : 0;

  const account = connectedAccounts.find(a => a.id === tx.account) || ACCOUNTS.find(a => a.id === tx.account);

  const linkedRecurId = tx.recurId || null;
  const linkedRecurring = recurList.find(r => r.id === linkedRecurId || r.txIds?.includes(tx.id));

  const primaryCat = CATEGORIES[txCats[0]?.catId] || {};
  const allocTotal = txCats.reduce((s, c) => s + c.amount, 0);
  const remaining = Math.round((Math.abs(tx.amount) - allocTotal) * 100) / 100;
  const isOnlyUncategorized = txCats.length === 1 && (txCats[0].catId === 'expenseUncategorized' || txCats[0].catId === 'incomeUncategorized');
  const effectiveRemaining = isOnlyUncategorized ? Math.abs(tx.amount) : remaining;
  const [showAllocInfo, setShowAllocInfo] = React.useState(false);

  React.useEffect(() => {
    const primaryCatId = txCats.find(c => c.catId !== 'expenseUncategorized' && c.catId !== 'incomeUncategorized')?.catId || txCats[0]?.catId;
    updateTx(tx.id, { cats: txCats, cat: primaryCatId || tx.cat });

  const heroAmount = reimburseAmt !== 0 ? net : tx.amount;

  const removeCategory = (i) => {

      return s.filter((_, j) => j !== i);

          <div className="m-cap" style={{ marginBottom: 8 }}>Categories</div>

            const cat = CATEGORIES[c.catId] || _catExt[c.catId] || {};
            const isUncategorized = c.catId === 'expenseUncategorized' || c.catId === 'incomeUncategorized';

                  <div className="m-num" style={{ fontSize:13, color: isUncategorized ? M.ink4 : M.ink2 }}>{fmtEur(c.amount)}</div>
                  {!isUncategorized && (
                    <button onClick={() => removeCategory(i)} style={{ background:'none', border:'none', color:M.clay, padding:'0 4px', fontSize:18, lineHeight:1, cursor:'pointer', fontFamily:M.fontUI }}>×</button>

                </div>
                {i < txCats.length - 1 && <Divider/>}

          {remaining > 0.005 && !isOnlyUncategorized && (

          {effectiveRemaining > 0.005 ? (

          <DetailRow label="Account" value={account?.name || '—'}/>

              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 500 }}>{tx.receiptStore ? `${tx.receiptStore} · receipt` : `${tx.merchant} · receipt`}</div>
                <div style={{ fontSize: 11, color: M.ink3, marginTop: 2 }}>{tx.receiptStore ? `${tx.receiptItems?.length || 0} items` : 'Photo captured'} · {fmtEur(tx.receiptTotal || Math.abs(tx.amount))}</div>
                <div style={{ display:'flex', gap:6, marginTop:6 }}>
                  <button className="m-tap" style={{ fontSize:11, fontWeight:600, color:M.ink3, background:M.paper2, border:`1px solid ${M.line}`, borderRadius:6, padding:'4px 8px', cursor:'pointer', fontFamily:M.fontUI }}>

                </div>
              </div>
            </div>

        {/* Reimbursement of (this tx is a reimbursement) */}
        {originalTx && (
          <>
            <div className="m-cap" style={{ marginBottom: 8, paddingLeft: 4 }}>Reimbursement of</div>
            <div className="m-card" style={{ padding: '4px 16px', marginBottom: 14, border: `1px solid ${M.line}` }}>
              <div className="m-tap" style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0' }}
                onClick={() => nav.push('txDetail', { id: originalTx.id })}>
                <div style={{ width: 32, height: 32, borderRadius: 9, background: M.claySoft, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <IcoMDI name={CATEGORIES[originalTx.cat]?.icon || 'help-circle-outline'} size={16} color={M.clay}/>
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>{originalTx.merchant}</div>
                  <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{fmtDate(originalTx.date)} · original {fmtEur(Math.abs(originalTx.amount))}</div>
                </div>
                <div className="m-num" style={{ fontWeight: 600, color: M.clay }}>
                  {netOriginalTx < 0 ? '−' : ''}{fmtEur(Math.abs(netOriginalTx))}
                </div>
                <I name="caretR" size={14} color={M.ink4}/>
              </div>
            </div>
          </>
        )}

        {/* Reimbursed by (this expense has a reimbursement) */}
        {linkedTx && (
          <>
            <div className="m-cap" style={{ marginBottom: 8, paddingLeft: 4 }}>Reimbursed by · 1</div>
            <div className="m-card" style={{ padding: '4px 16px', marginBottom: 14, border: `1px solid ${M.line}` }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0' }}>
                <div className="m-tap" style={{ display:'flex', alignItems:'center', gap:12, flex:1, minWidth:0 }}
                  onClick={() => nav.push('txDetail', { id: linkedTx.id })}>
                  <div style={{ width: 32, height: 32, borderRadius: 9, background: M.sageSoft, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink:0 }}>
                    <I name="link" size={16} color={M.sage}/>
                  </div>
                  <div style={{ flex: 1, minWidth:0 }}>
                    <div style={{ fontSize: 13, fontWeight: 500, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{linkedTx.merchant}</div>
                    <div style={{ fontSize: 11, color: M.ink3, marginTop: 1 }}>{fmtDate(linkedTx.date)} · reimbursed</div>
                  </div>
                  <div className="m-num" style={{ fontWeight: 600, color: M.sage }}>+{fmtEur(linkedTx.amount)}</div>
                  <I name="caretR" size={14} color={M.ink4}/>
                </div>
                <button className="m-tap" onClick={() => updateTx(linkedTx.id, { linkedTo: undefined })}
                  style={{ background:'none', border:'none', color:M.clay, fontSize:18, lineHeight:1, cursor:'pointer', fontFamily:M.fontUI, padding:'0 0 0 8px', flexShrink:0 }}>×</button>
              </div>
            </div>
          </>
        )}

        {net !== 0 && (
          <button className="m-btn outline m-tap" style={{ width: '100%', marginBottom: 18 }}
            onClick={() => nav.push('linkReimburse', { txId: tx.id, positive })}>
            <I name="link" size={16}/>
            {positive ? 'Link reimbursed expense' : 'Link a reimbursement'}
          </button>
        )}
      </div>

      {showCatPicker && (
        <CategoryPicker
          selected={txCats.length === 1 && !isOnlyUncategorized ? txCats[0].catId : null}
          positiveOnly={positive}
          defaultAmount={effectiveRemaining > 0.005 ? effectiveRemaining : 0}
          maxAmount={Math.abs(tx.amount)}
          onClose={() => setShowCatPicker(false)}
          onPick={(catId, val) => {
            setTxCats(s => {
              if (isOnlyUncategorized) {
                const uncatId = positive ? 'incomeUncategorized' : 'expenseUncategorized';
                const leftover = Math.round((Math.abs(tx.amount) - val) * 100) / 100;
                if (leftover < 0.005) return [{ catId, amount: val }];
                return [{ catId, amount: val }, { catId: uncatId, amount: leftover }];
              }
              const idx = s.findIndex(x => x.catId === catId);
              if (idx >= 0) return s.map((x, i) => i === idx ? { ...x, amount: val } : x);
              return [...s, { catId, amount: val }];
            });
            setShowCatPicker(false);
          }}
        />
      )}
    </div>
  );
}
